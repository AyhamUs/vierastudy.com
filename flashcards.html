<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VieraStudy - Flashcards</title>
    <meta name="description" content="Create and study flashcards with VieraStudy. Master any subject with spaced repetition and smart study tools.">
    <meta name="keywords" content="VieraStudy, flashcards, study cards, spaced repetition, memorization, study tools, learning">
    <link rel="canonical" href="https://vierastudy.com/flashcards">
    <meta property="og:title" content="VieraStudy - Flashcards">
    <meta property="og:description" content="Create and study flashcards with VieraStudy. Master any subject with spaced repetition and smart study tools.">
    <meta property="og:url" content="https://vierastudy.com/flashcards">
    <meta property="og:image" content="https://vierastudy.com/vierastudy.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="VieraStudy">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VieraStudy - Flashcards">
    <meta name="twitter:description" content="Create and study flashcards with VieraStudy. Master any subject with spaced repetition and smart study tools.">
    <meta name="twitter:image" content="https://vierastudy.com/vierastudy.png">
    <link rel="icon" href="vierastudy.png" type="image/png">
    <link rel="stylesheet" href="shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
        }

        .header {
            background: var(--surface);
            padding: 25px 40px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text);
        }

        .header h1 i {
            color: #8b5cf6;
        }

        .add-deck-btn {
            background: var(--accent);
            color: var(--accent-contrast);
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .add-deck-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .content {
            padding: 40px;
        }

        .decks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .deck-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid var(--accent);
        }

        .deck-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .deck-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .deck-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .deck-menu {
            color: var(--text-faint);
            cursor: pointer;
            padding: 4px;
        }

        .deck-menu:hover {
            color: var(--accent);
        }

        .deck-stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .deck-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .deck-stat i {
            color: var(--accent);
        }

        .deck-class-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        /* Study Mode */
        .study-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .study-mode.active {
            display: flex;
        }

        .study-container {
            width: 90%;
            max-width: 600px;
        }

        .study-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        .study-header-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .study-progress {
            font-size: 18px;
        }

        .study-due-counter {
            font-size: 13px;
            color: var(--text-faint);
        }

        .study-due-counter span {
            color: #f59e0b;
            font-weight: 600;
        }

        .close-study {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-study:hover {
            background: rgba(255,255,255,0.2);
        }

        .flashcard {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 60px 40px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 24px;
            color: var(--text);
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .study-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .study-btn {
            background: var(--surface);
            border: none;
            padding: 16px 35px;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }

        .study-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .study-btn.correct {
            background: #22c55e;
            color: white;
        }

        .study-btn.correct:hover {
            background: #16a34a;
        }

        .study-btn.wrong {
            background: #f97316;
            color: white;
        }

        .study-btn.wrong:hover {
            background: #ea580c;
        }

        .study-btn.hard {
            background: #f59e0b;
            color: white;
        }

        .study-btn.hard:hover {
            background: #d97706;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 20px;
                width: 95%;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-faint);
            cursor: pointer;
            padding: 0;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: var(--text-muted);
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .flashcard-inputs {
            display: grid;
            gap: 15px;
            margin-top: 15px;
        }

        .flashcard-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: var(--surface-2);
            border-radius: var(--radius-xs);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: var(--accent-contrast);
            flex: 1;
            border: none;
            padding: 14px;
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        .flashcard-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 15px;
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            align-items: start;
        }

        .flashcard-input-group .inputs-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .remove-card-btn {
            background: var(--surface-2);
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-faint);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            height: 36px;
            margin-top: 4px;
        }

        .remove-card-btn:hover {
            background: #ef4444;
            color: white;
        }

        .add-card-btn {
            background: var(--surface-2);
            color: var(--accent);
            border: 2px dashed var(--border);
            padding: 12px;
            border-radius: var(--radius-xs);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .add-card-btn:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px 20px 20px 75px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .content {
                padding: 20px;
            }

            .decks-grid {
                grid-template-columns: 1fr;
            }

            .flashcard {
                padding: 40px 20px;
                font-size: 18px;
                min-height: 44px;
                touch-action: manipulation;
            }

            .flashcard-input-group {
                grid-template-columns: 1fr;
            }

            .study-controls {
                flex-wrap: wrap;
            }

            .study-btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px 15px 15px 65px;
            }

            .content {
                padding: 15px;
            }
        }

        /* Bug Report Button */
        .bug-report-btn {
            background: rgba(251, 191, 36, 0.1);
            border: none;
            color: #f59e0b;
            width: 35px;
            height: 35px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 8px;
        }
        .bug-report-btn:hover { background: #f59e0b; color: white; }
        .bug-report-btn i { font-size: 14px; }
        .bug-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .bug-modal.active { display: flex; }
        .bug-modal-content { background: var(--surface); border-radius: var(--radius); padding: 30px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .bug-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bug-modal-title { font-size: 22px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .bug-modal-title i { color: #f59e0b; }
        .bug-close-btn { background: none; border: none; font-size: 24px; color: var(--text-faint); cursor: pointer; transition: color 0.3s; }
        .bug-close-btn:hover { color: #ef4444; }
        .bug-form-group { margin-bottom: 20px; }
        .bug-form-label { display: block; font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 14px; }
        .bug-form-input, .bug-form-select, .bug-form-textarea { width: 100%; padding: 12px 14px; border: 2px solid var(--border-strong); border-radius: var(--radius-xs); font-size: 14px; font-family: inherit; transition: border-color 0.3s, box-shadow 0.3s; background: var(--surface); color: var(--text); }
        .bug-form-input:focus, .bug-form-select:focus, .bug-form-textarea:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); }
        .bug-form-textarea { resize: vertical; min-height: 120px; }
        .bug-page-info { background: var(--surface-2); border-radius: var(--radius-xs); padding: 12px 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .bug-page-info i { color: var(--accent); }
        .bug-page-info span { font-size: 13px; color: var(--text-muted); }
        .bug-page-info strong { color: var(--text); }
        .bug-submit-btn { width: 100%; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; border: none; padding: 14px; border-radius: var(--radius-xs); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bug-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
        .bug-submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button><div class="mobile-overlay" onclick="toggleMobileMenu()"></div>

    <div class="container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="header">
                <h1><i class="fas fa-layer-group" style="color: #8b5cf6;"></i> Flashcards</h1>
                <button class="add-deck-btn" onclick="openDeckModal()">
                    <i class="fas fa-plus"></i>
                    Create Deck
                </button>
            </div>

            <div class="content">
                <div class="decks-grid" id="decksGrid">
                    <!-- Decks will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Study Mode -->
    <div class="study-mode" id="studyMode">
        <div class="study-container">
            <div class="study-header">
                <div class="study-header-info">
                    <div class="study-progress" id="studyProgress">1 / 10</div>
                    <div class="study-due-counter" id="studyDueCounter">Due today: <span id="dueCount">0</span></div>
                </div>
                <button class="close-study" onclick="closeStudyMode()">&#x2715;</button>
            </div>
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="card-face card-front" id="cardFront">
                    Question appears here
                </div>
                <div class="card-face card-back" id="cardBack">
                    Answer appears here
                </div>
            </div>
            <div class="study-controls">
                <button class="study-btn wrong" onclick="markCardWrong()">
                    <i class="fas fa-rotate-left"></i> Needs Work
                </button>
                <button class="study-btn hard" onclick="markCardHard()">
                    <i class="fas fa-exclamation"></i> Hard
                </button>
                <button class="study-btn correct" onclick="markCardCorrect()">
                    <i class="fas fa-check" style="color: #fff;"></i> Got It!
                </button>
            </div>
        </div>
    </div>

    <!-- Create Deck Modal -->
    <div class="modal" id="deckModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create New Deck</h2>
                <button class="close-modal" onclick="closeDeckModal()">&#215;</button>
            </div>
            <form id="deckForm" onsubmit="saveDeck(event)">
                <div class="form-group">
                    <label class="form-label">Deck Name <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-input" id="deckName" required placeholder="e.g., Spanish Vocabulary">
                </div>

                <div class="form-group">
                    <label class="form-label">Class</label>
                    <select class="form-select" id="deckClass">
                        <option value="">Select a class (optional)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Flashcards</label>
                    <div class="flashcard-inputs" id="flashcardInputs">
                        <div class="flashcard-input-group">
                            <div class="inputs-wrapper">
                                <input type="text" class="form-input" placeholder="Question" required>
                                <input type="text" class="form-input" placeholder="Answer" required>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="add-card-btn" onclick="addCardInput()">
                        <i class="fas fa-plus"></i> Add Another Card
                    </button>
                </div>

                <button type="submit" class="submit-btn">
                    Create Deck
                </button>
            </form>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon success">
                <i class="fas fa-check" style="color: #10b981;"></i>
            </div>
            <div id="notificationTitle" class="notification-title">Success</div>
            <div id="notificationMessage" class="notification-message">Operation completed successfully!</div>
            <button class="notification-btn" onclick="closeNotification()">OK</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="notification-modal">
        <div class="notification-content">
            <div id="confirmationIcon" class="notification-icon warning">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div id="confirmationTitle" class="notification-title">Confirm Action</div>
            <div id="confirmationMessage" class="notification-message">Are you sure you want to proceed?</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="notification-btn" style="background: #64748b;" onclick="cancelConfirmation()">Cancel</button>
                <button class="notification-btn" id="confirmButton" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <div id="bugReportModal" class="bug-modal">
        <div class="bug-modal-content">
            <div class="bug-modal-header">
                <div class="bug-modal-title"><i class="fas fa-bug"></i> Report a Bug</div>
                <button class="bug-close-btn" onclick="closeBugReportModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="bug-page-info"><i class="fas fa-link"></i><span>Reporting from: <strong id="bugPageName">Flashcards</strong></span><input type="hidden" id="bugPage" value=""></div>
            <form onsubmit="submitBugReport(event)">
                <div class="bug-form-group"><label class="bug-form-label">Category</label><select class="bug-form-select" id="bugCategory" required><option value="General">General Issue</option><option value="UI/Design">UI/Design Problem</option><option value="Functionality">Feature Not Working</option><option value="Performance">Performance Issue</option><option value="Login/Account">Login/Account Problem</option><option value="Data Loss">Data Loss</option><option value="Mobile">Mobile-Specific Issue</option><option value="Other">Other</option></select></div>
                <div class="bug-form-group"><label class="bug-form-label">Describe the bug *</label><textarea class="bug-form-textarea" id="bugDescription" placeholder="Please describe what happened..." required></textarea></div>
                <div class="bug-form-group"><label class="bug-form-label">Your Email (optional)</label><input type="email" class="bug-form-input" id="bugUserEmail" placeholder="your@email.com"></div>
                <div class="bug-form-group"><label class="bug-form-label">Your Name (optional)</label><input type="text" class="bug-form-input" id="bugUserName" placeholder="Your name"></div>
                <button type="submit" class="bug-submit-btn"><i class="fas fa-paper-plane"></i> Submit Bug Report</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="shared.js"></script>
    <script>
        // Session check - redirect to login if not authenticated
        (async function() {
            await vieraAPI.ready;
            if (!vieraAPI.isLoggedIn() || !vieraAPI.getUser()) {
                window.location.href = 'login.html';
                return;
            }
        })();
    </script>
    <script>
        let decks = [];
        let classes = [];
        let currentDeck = null;
        let currentCardIndex = 0;
        let studyQueue = [];

        // Initialize data from API cache
        function initializeData() {
            decks = vieraAPI.getFlashcards() || [];
            classes = vieraAPI.getClasses() || [];
        }

        // Log activity via API
        function logActivity(icon, color, title) {
            vieraAPI.logActivity(icon, color, title);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for API to be ready (data loaded from cloud)
            await vieraAPI.ready;

            // Only redirect if there's truly no token
            if (!vieraAPI.isLoggedIn()) {
                window.location.href = '/';
                return;
            }

            // Now initialize with data from cache
            initializeData();
            renderDecks();
            populateClassSelect();
        });

        // ============================================
        // SM-2 SPACED REPETITION ALGORITHM
        // ============================================
        function sm2Update(card, quality) {
            // quality: 0=total blackout, 3=correct with difficulty, 4=correct, 5=perfect
            if (!card.repetitions) card.repetitions = 0;
            if (!card.easeFactor) card.easeFactor = 2.5;
            if (!card.interval) card.interval = 1;

            if (quality < 3) {
                card.repetitions = 0;
                card.interval = 1;
            } else {
                card.repetitions++;
                if (card.repetitions === 1) card.interval = 1;
                else if (card.repetitions === 2) card.interval = 6;
                else card.interval = Math.round(card.interval * card.easeFactor);
            }
            card.easeFactor = Math.max(1.3, card.easeFactor + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
            // set due date as days from now
            var d = new Date();
            d.setDate(d.getDate() + card.interval);
            card.dueDate = d.toISOString().split('T')[0];
            return card;
        }

        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }

        function isDueCard(card) {
            if (!card.dueDate) return true; // new card, never studied
            return card.dueDate <= getTodayStr();
        }

        function buildStudyQueue(deck) {
            var today = getTodayStr();
            var due = [];
            var newCards = [];
            deck.cards.forEach(function(card, idx) {
                if (!card.dueDate) {
                    newCards.push(idx);
                } else if (card.dueDate <= today) {
                    due.push(idx);
                }
            });
            // Due cards first, then new cards
            return due.concat(newCards);
        }

        function countDueCards(deck) {
            return buildStudyQueue(deck).length;
        }

        function populateClassSelect() {
            const select = document.getElementById('deckClass');
            select.innerHTML = '<option value="">Select a class (optional)</option>';
            classes.forEach(cls => {
                select.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
            });
        }

        function renderDecks() {
            const grid = document.getElementById('decksGrid');
            if (decks.length === 0) {
                grid.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 40px; grid-column: 1/-1;">No flashcard decks yet. Click "Create Deck" to get started!</p>';
                return;
            }

            grid.innerHTML = decks.map(deck => {
                const deckClass = classes.find(c => c.id === deck.classId);
                const dueCount = countDueCards(deck);
                return `
                    <div class="deck-card" style="border-left-color: ${deckClass?.color || '#3b82f6'}" onclick="startStudy(${deck.id})">
                        <div class="deck-header">
                            <div class="deck-title">${deck.name}</div>
                            <div class="deck-menu" onclick="event.stopPropagation(); deleteDeck(${deck.id})">
                                <i class="fas fa-trash"></i>
                            </div>
                        </div>
                        ${deckClass ? `<span class="deck-class-badge" style="background: ${deckClass.color}20; color: ${deckClass.color}"><i class="fas ${deckClass.icon || 'fa-book'}" style="font-size: 11px;"></i> ${deckClass.name}</span>` : ''}
                        <div class="deck-stats">
                            <div class="deck-stat">
                                <i class="fas fa-layer-group" style="color: #8b5cf6;"></i>
                                ${deck.cards.length} cards
                            </div>
                            ${dueCount > 0 ? `<div class="deck-stat"><i class="fas fa-clock" style="color: #f59e0b;"></i> ${dueCount} due</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openDeckModal() {
            populateClassSelect();
            document.getElementById('deckModal').classList.add('active');
            document.getElementById('flashcardInputs').innerHTML = `
                <div class="flashcard-input-group">
                    <div class="inputs-wrapper">
                        <input type="text" class="form-input" placeholder="Question" required>
                        <input type="text" class="form-input" placeholder="Answer" required>
                    </div>
                    <button type="button" class="remove-card-btn" onclick="removeCardInput(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
        }

        function closeDeckModal() {
            document.getElementById('deckModal').classList.remove('active');
            document.getElementById('deckForm').reset();
        }

        function addCardInput() {
            const container = document.getElementById('flashcardInputs');
            const newInput = document.createElement('div');
            newInput.className = 'flashcard-input-group';
            newInput.innerHTML = `
                <div class="inputs-wrapper">
                    <input type="text" class="form-input" placeholder="Question" required>
                    <input type="text" class="form-input" placeholder="Answer" required>
                </div>
                <button type="button" class="remove-card-btn" onclick="removeCardInput(this)">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            container.appendChild(newInput);
        }

        function removeCardInput(button) {
            const container = document.getElementById('flashcardInputs');
            if (container.children.length > 1) {
                button.closest('.flashcard-input-group').remove();
            } else {
                showNotification('You need at least one flashcard', 'error', 'Cannot Remove');
            }
        }

        function saveDeck(event) {
            event.preventDefault();

            const name = document.getElementById('deckName').value.trim();
            if (!name) {
                showNotification('Please enter a deck name', 'error', 'Validation Error');
                return;
            }

            const cardGroups = document.querySelectorAll('.flashcard-input-group');
            const cards = [];

            cardGroups.forEach(group => {
                const inputs = group.querySelectorAll('.form-input');
                const question = inputs[0].value.trim();
                const answer = inputs[1].value.trim();

                if (question && answer) {
                    cards.push({
                        question,
                        answer,
                        interval: 1,
                        easeFactor: 2.5,
                        dueDate: null,
                        repetitions: 0
                    });
                }
            });

            if (cards.length === 0) {
                showNotification('Please add at least one complete flashcard', 'error', 'Validation Error');
                return;
            }

            const classId = document.getElementById('deckClass').value;

            const deck = {
                id: Date.now(),
                name: name,
                classId: classId ? parseInt(classId) : null,
                cards: cards,
                created: new Date().toISOString()
            };

            decks.push(deck);
            vieraAPI.setFlashcards(decks);

            // Log activity
            logActivity('fas fa-layer-group', 'purple', `Created flashcard deck: ${name}`);

            renderDecks();
            closeDeckModal();
            showNotification(`Created deck with ${cards.length} card${cards.length > 1 ? 's' : ''}!`, 'success', 'Deck Created');
        }

        async function deleteDeck(id) {
            const confirmed = await showConfirmation(
                'This deck and all its flashcards will be permanently deleted. This action cannot be undone.',
                'Delete Deck?',
                'danger'
            );

            if (confirmed) {
                decks = decks.filter(d => d.id !== id);
                vieraAPI.setFlashcards(decks);
                renderDecks();
                showNotification('Deck deleted successfully', 'success', 'Deck Deleted');
            }
        }

        function startStudy(deckId) {
            currentDeck = decks.find(d => d.id === deckId);
            if (!currentDeck || currentDeck.cards.length === 0) return;

            // Ensure all cards have SR fields
            currentDeck.cards.forEach(function(card) {
                if (card.interval === undefined) card.interval = 1;
                if (card.easeFactor === undefined) card.easeFactor = 2.5;
                if (card.dueDate === undefined) card.dueDate = null;
                if (card.repetitions === undefined) card.repetitions = 0;
            });

            studyQueue = buildStudyQueue(currentDeck);

            // If nothing is due or new, show all cards
            if (studyQueue.length === 0) {
                studyQueue = currentDeck.cards.map(function(_, i) { return i; });
            }

            var dueCount = studyQueue.length;
            document.getElementById('dueCount').textContent = dueCount;

            currentCardIndex = 0;
            showCard();
            document.getElementById('studyMode').classList.add('active');
        }

        function showCard() {
            var cardIdx = studyQueue[currentCardIndex];
            var card = currentDeck.cards[cardIdx];
            document.getElementById('cardFront').textContent = card.question;
            document.getElementById('cardBack').textContent = card.answer;
            document.getElementById('studyProgress').textContent = (currentCardIndex + 1) + ' / ' + studyQueue.length;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function markCardCorrect() {
            var cardIdx = studyQueue[currentCardIndex];
            var card = currentDeck.cards[cardIdx];
            sm2Update(card, 4);
            saveDeckState();
            nextCard();
        }

        function markCardWrong() {
            var cardIdx = studyQueue[currentCardIndex];
            var card = currentDeck.cards[cardIdx];
            sm2Update(card, 1);
            saveDeckState();
            nextCard();
        }

        function markCardHard() {
            var cardIdx = studyQueue[currentCardIndex];
            var card = currentDeck.cards[cardIdx];
            sm2Update(card, 2);
            saveDeckState();
            nextCard();
        }

        function saveDeckState() {
            var deckIdx = decks.findIndex(function(d) { return d.id === currentDeck.id; });
            if (deckIdx !== -1) {
                decks[deckIdx] = currentDeck;
                vieraAPI.setFlashcards(decks);
            }
        }

        function nextCard() {
            currentCardIndex++;
            if (currentCardIndex >= studyQueue.length) {
                showNotification("Congratulations! You've completed this study session!", 'success', 'Session Complete!');

                // Log activity for completing a deck
                logActivity('fas fa-graduation-cap', 'purple', `Studied flashcard deck: ${currentDeck.name}`);

                renderDecks();
                closeStudyMode();
                return;
            }
            showCard();
        }

        function closeStudyMode() {
            document.getElementById('studyMode').classList.remove('active');
            currentDeck = null;
            currentCardIndex = 0;
            studyQueue = [];
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', function(e) {
            const isTyping = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable;

            // Escape - Close modals and study mode
            if (e.key === 'Escape') {
                const studyMode = document.getElementById('studyMode');
                if (studyMode && studyMode.classList.contains('active')) {
                    closeStudyMode();
                    return;
                }
                const deckModal = document.getElementById('deckModal');
                if (deckModal && deckModal.classList.contains('active')) {
                    closeDeckModal();
                }
            }

            if (isTyping && e.key !== 'Escape') return;

            if ((e.metaKey || e.ctrlKey) && e.key === 'h') { e.preventDefault(); window.location.href = '/'; }
            if ((e.metaKey || e.ctrlKey) && e.key === 't') { e.preventDefault(); window.location.href = 'todo'; }
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'N') { e.preventDefault(); window.location.href = 'notes'; }
            if ((e.metaKey || e.ctrlKey) && e.key === 'p') { e.preventDefault(); window.location.href = 'pomodoro'; }
            if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); window.location.href = 'schedule'; }
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'P') { e.preventDefault(); window.location.href = 'progress-tracker'; }
            if ((e.metaKey || e.ctrlKey) && e.key === ',') { e.preventDefault(); window.location.href = 'settings'; }
        });

        // ============ BUG REPORT FUNCTIONALITY ============
        const BUG_REPORT_URL = 'https://script.google.com/macros/s/AKfycbxW5D6i7Td2Em-OqHmCpgy-DVQuzn1oCzn_pBRB2IOb_8MGfwgPqjF8KghYQDZpMNdKUw/exec';
        function openBugReportModal() {
            document.getElementById('bugReportModal').classList.add('active');
            document.getElementById('bugPage').value = window.location.href;
            document.getElementById('bugPageName').textContent = 'Flashcards';
            const user = vieraAPI.getUser();
            if (user) {
                document.getElementById('bugUserEmail').value = user.email || '';
                document.getElementById('bugUserName').value = `${user.firstName || ''} ${user.lastName || ''}`.trim();
            }
        }
        function closeBugReportModal() { document.getElementById('bugReportModal').classList.remove('active'); }
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';
            if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            if (/iPhone|iPad|iPod|Android/i.test(ua)) browser += ' (Mobile)';
            return browser;
        }
        async function submitBugReport(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            const bugData = {
                page: document.getElementById('bugPage').value, pageName: 'Flashcards',
                category: document.getElementById('bugCategory').value, description: document.getElementById('bugDescription').value,
                userEmail: document.getElementById('bugUserEmail').value || 'Anonymous', userName: document.getElementById('bugUserName').value || 'Anonymous',
                browser: getBrowserInfo(), screenSize: `${window.innerWidth}x${window.innerHeight}`, userAgent: navigator.userAgent
            };
            try {
                await fetch(BUG_REPORT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bugData) });
                showNotification('Bug report submitted successfully!', 'success', 'Report Sent');
                closeBugReportModal();
                document.getElementById('bugDescription').value = '';
            } catch (error) { showNotification('Failed to submit bug report.', 'error', 'Error'); }
            finally { btn.disabled = false; btn.innerHTML = originalContent; }
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeBugReportModal(); });
    </script>
