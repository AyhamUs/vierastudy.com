<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - VieraStudy</title>
    <link rel="icon" href="vierastudy.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f7f7f5;
            color: #2e2e2c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #ecebe8;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header i {
            font-size: 28px;
            color: #2f80ed;
            margin-bottom: 18px;
        }

        .header h1 {
            color: #2e2e2c;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .header p {
            color: #73726e;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2e2e2c;
            font-weight: 500;
            font-size: 13px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group input {
            flex: 1;
            padding: 11px 13px;
            border: 1px solid #e0dfdb;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #2e2e2c;
            background: #ffffff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-group input::placeholder {
            color: #9b9a96;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2f80ed;
            box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.12);
        }

        .toggle-password {
            position: relative;
            cursor: pointer;
            color: #9b9a96;
            transition: color 0.15s;
            font-size: 16px;
            padding: 8px;
        }

        .toggle-password:hover {
            color: #2f80ed;
        }

        .password-requirements {
            font-size: 12px;
            color: #9b9a96;
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #2f80ed;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s;
            margin-top: 6px;
        }

        .btn:hover {
            background: #1f6fe0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 22px;
        }

        .back-link a {
            color: #2f80ed;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.15s;
        }

        .back-link a:hover {
            color: #1f6fe0;
        }

        .message {
            padding: 11px 13px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #f0f7f1;
            color: #2e6b3a;
            border: 1px solid #d4e8d9;
            display: block;
        }

        .message.error {
            background-color: #fbf0f0;
            color: #a4453f;
            border: 1px solid #f0d9d8;
            display: block;
        }

        .message i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-lock"></i>
            <h1>Reset Password</h1>
            <p>Create a new password for your account.</p>
        </div>

        <div id="message" class="message"></div>

        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-group">
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
                <div class="password-requirements">
                    Must be at least 8 characters long
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Reset Password
            </button>
        </form>

        <div class="back-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
        const accessToken = hashParams.get('access_token');
        const resetToken = urlParams.get('token') || accessToken;

        if (!resetToken && !accessToken) {
            showMessage('Invalid reset link. Please request a new password reset.', 'error');
            submitBtn.disabled = true;
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>${text}`;
        }

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = newPasswordInput.type === 'password' ? 'text' : 'password';
            newPasswordInput.type = type;
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
            toggleConfirmPassword.classList.toggle('fa-eye');
            toggleConfirmPassword.classList.toggle('fa-eye-slash');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (newPassword.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
                const supabase = createClient('https://zagvfumqcnejxneuqcqp.supabase.co', 'sb_publishable_GBj_QfNq2jGCzSvO-mjfTA_oV4m6blG');
                if (accessToken) {
                    await supabase.auth.setSession({ access_token: accessToken, refresh_token: hashParams.get('refresh_token') });
                }
                const { error } = await supabase.auth.updateUser({ password: newPassword });
                if (!error) {
                    showMessage('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    showMessage(error.message || 'Failed to reset password. The link may be invalid or expired.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error. Please check your connection and try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
