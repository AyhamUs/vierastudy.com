<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VieraStudy - To-Do List</title>
    <meta name="description" content="Manage your tasks with VieraStudy's To-Do List. Stay organized with priorities, due dates, and class assignments.">
    <meta name="keywords" content="VieraStudy, to-do list, task manager, student tasks, assignments, productivity, task organization">
    <link rel="canonical" href="https://vierastudy.com/todo">
    <meta property="og:title" content="VieraStudy - To-Do List">
    <meta property="og:description" content="Manage your tasks with VieraStudy's To-Do List. Stay organized with priorities, due dates, and class assignments.">
    <meta property="og:url" content="https://vierastudy.com/todo">
    <meta property="og:image" content="https://vierastudy.com/vierastudy.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="VieraStudy">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VieraStudy - To-Do List">
    <meta name="twitter:description" content="Manage your tasks with VieraStudy's To-Do List. Stay organized with priorities, due dates, and class assignments.">
    <meta name="twitter:image" content="https://vierastudy.com/vierastudy.png">
    <link rel="icon" href="vierastudy.png" type="image/png">
    <link rel="stylesheet" href="shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        body.dark-mode .priority-badge {
            opacity: 0.9;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .pro-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1e293b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(251, 191, 36, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .ai-dropdown {
            position: relative;
        }

        .ai-dropdown .nav-item {
            padding: 15px 25px;
        }

        .dropdown-header {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .dropdown-header .icon-text {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .dropdown-header i.fa-brain, .dropdown-header i.fa-calculator {
            width: 25px;
            margin-right: 15px;
            font-size: 18px;
        }

        .dropdown-header .fa-chevron-down {
            font-size: 12px;
            transition: transform 0.3s;
            margin-left: auto;
        }

        .ai-dropdown.open .fa-chevron-down {
            transform: rotate(180deg);
        }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .ai-dropdown.open .dropdown-content {
            max-height: 350px;
            opacity: 1;
        }

        .dropdown-item {
            padding: 12px 25px 12px 55px;
            color: var(--text-faint);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .dropdown-item:hover {
            background: var(--accent-soft);
            color: var(--accent);
            padding-left: 60px;
            border-left-color: var(--accent);
        }

        .dropdown-item i {
            width: 18px;
            font-size: 14px;
            text-align: center;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .user-plan {
            font-size: 11px;
            color: var(--text-faint);
            font-weight: 500;
        }

        .user-plan.premium {
            color: #fbbf24;
            font-weight: 600;
        }

        .user-badge {
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1e293b;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
        }

        .header {
            background: var(--surface);
            padding: 25px 40px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text);
        }

        .header h1 i {
            color: var(--text-faint);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .add-todo-btn {
            background: var(--accent);
            color: var(--accent-contrast);
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .add-todo-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .content {
            padding: 40px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--surface);
            border: 2px solid var(--border);
            padding: 10px 20px;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--accent-contrast);
            border-color: var(--accent);
        }

        .todos-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow-sm);
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 20px;
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius-xs);
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: grab;
        }

        .todo-item:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.1);
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-title {
            text-decoration: line-through;
        }

        .todo-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-strong);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .todo-checkbox:hover {
            border-color: var(--accent);
        }

        .todo-checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
        }

        .todo-content {
            flex: 1;
        }

        .todo-title {
            font-weight: 600;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 5px;
        }

        .todo-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .todo-class, .todo-priority, .todo-due {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .todo-priority.high {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .todo-priority.medium {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
        }

        .todo-priority.low {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .todo-due {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-muted);
        }

        .todo-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-faint);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: var(--surface-hover);
            color: var(--accent);
        }

        .icon-btn.delete:hover {
            color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 20px;
                width: 95%;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-faint);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: var(--accent-contrast);
            border: none;
            padding: 14px;
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px 20px 20px 75px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .content {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .todo-item {
                flex-wrap: wrap;
            }

            .ai-dropdown.open .dropdown-content,
            .math-dropdown.open .dropdown-content {
                max-height: 500px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .dropdown-item {
                min-height: 44px;
                touch-action: manipulation;
            }

            .dropdown-item:hover {
                padding-left: 35px;
            }

            .btn,
            button {
                min-height: 44px;
                touch-action: manipulation;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px 15px 15px 65px;
            }

            .content {
                padding: 15px;
            }
        }

        /* Notification Modal */
        .notification-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
        }

        .notification-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .notification-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }

        .notification-icon.success {
            background: #10b981;
            color: white;
        }

        .notification-icon.info {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        .notification-icon.warning {
            background: #f59e0b;
            color: white;
        }

        .notification-icon.error {
            background: #ef4444;
            color: white;
        }

        .notification-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }

        .notification-message {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .notification-btn {
            background: var(--accent);
            color: var(--accent-contrast);
            border: none;
            padding: 12px 30px;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .notification-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Bug Report Modal */
        .bug-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bug-modal.active {
            display: flex;
        }

        .bug-modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .bug-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .bug-modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bug-modal-title i {
            color: #f59e0b;
        }

        .bug-close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-faint);
            cursor: pointer;
            transition: color 0.3s;
        }

        .bug-close-btn:hover {
            color: #ef4444;
        }

        .bug-form-group {
            margin-bottom: 20px;
        }

        .bug-form-label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .bug-form-input,
        .bug-form-select,
        .bug-form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: var(--surface);
            color: var(--text);
        }

        .bug-form-input:focus,
        .bug-form-select:focus,
        .bug-form-textarea:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .bug-form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .bug-page-info {
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            padding: 12px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bug-page-info i {
            color: var(--accent);
        }

        .bug-page-info span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .bug-page-info strong {
            color: var(--text);
        }

        .bug-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .bug-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .bug-submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Subtask styles */
        .subtask-section { margin-top: 8px; padding-left: 20px; border-left: 2px solid var(--accent, #3b82f6); }
        .subtask-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
        .subtask-done { text-decoration: line-through; opacity: 0.6; }
        .subtask-progress { font-size: 11px; color: var(--accent, #3b82f6); font-weight: 600; margin-bottom: 4px; }
        .subtask-input { border: none; border-bottom: 1px solid var(--border); font-size: 13px; padding: 4px; width: 100%; background: transparent; outline: none; color: inherit; }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button><div class="mobile-overlay" onclick="toggleMobileMenu()"></div>

    <div class="container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="header">
                <h1><i class="fas fa-list-check"></i> To-Do List</h1>
                <button class="add-todo-btn" onclick="openTodoModal()">
                    <i class="fas fa-plus"></i>
                    Add Task
                </button>
            </div>

            <div class="content">
                <div class="filters">
                    <button class="filter-btn active" onclick="filterTodos('all')">All</button>
                    <button class="filter-btn" onclick="filterTodos('active')">Active</button>
                    <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
                    <button class="filter-btn" onclick="filterTodos('high')">High Priority</button>
                </div>

                <div class="todos-section">
                    <div id="todosList">
                        <!-- Todos will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Todo Modal -->
    <div class="modal" id="todoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Task</h2>
                <button class="close-modal" onclick="closeTodoModal()">×</button>
            </div>
            <form id="todoForm" onsubmit="saveTodo(event)">
                <div class="form-group">
                    <label class="form-label">Task Title <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-input" id="todoTitle" required placeholder="What needs to be done?">
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="todoDescription" placeholder="Add details..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Class</label>
                        <select class="form-select" id="todoClass">
                            <option value="">Select class</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Priority <span style="color: #ef4444;">*</span></label>
                        <select class="form-select" id="todoPriority" required>
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Due Date</label>
                    <input type="date" class="form-input" id="todoDue">
                </div>

                <input type="hidden" id="editingTodoId" value="">

                <button type="submit" class="submit-btn">
                    Save Task
                </button>
            </form>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon success">
                <i class="fas fa-check" style="color: #10b981;"></i>
            </div>
            <div id="notificationTitle" class="notification-title">Success</div>
            <div id="notificationMessage" class="notification-message">Operation completed successfully!</div>
            <button class="notification-btn" onclick="closeNotification()">OK</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="notification-modal">
        <div class="notification-content">
            <div id="confirmationIcon" class="notification-icon warning">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div id="confirmationTitle" class="notification-title">Confirm Action</div>
            <div id="confirmationMessage" class="notification-message">Are you sure you want to proceed?</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="notification-btn" style="background: #64748b;" onclick="cancelConfirmation()">Cancel</button>
                <button class="notification-btn" id="confirmButton" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Bug Report Modal -->
    <div id="bugReportModal" class="bug-modal">
        <div class="bug-modal-content">
            <div class="bug-modal-header">
                <div class="bug-modal-title"><i class="fas fa-bug"></i> Report a Bug</div>
                <button class="bug-close-btn" onclick="closeBugReportModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="bug-page-info">
                <i class="fas fa-link"></i>
                <span>Reporting from: <strong id="bugPageName">To-Do List</strong></span>
                <input type="hidden" id="bugPage" value="">
            </div>
            <form onsubmit="submitBugReport(event)">
                <div class="bug-form-group">
                    <label class="bug-form-label">Category</label>
                    <select class="bug-form-select" id="bugCategory" required>
                        <option value="General">General Issue</option>
                        <option value="UI/Design">UI/Design Problem</option>
                        <option value="Functionality">Feature Not Working</option>
                        <option value="Performance">Performance Issue</option>
                        <option value="Login/Account">Login/Account Problem</option>
                        <option value="Data Loss">Data Loss</option>
                        <option value="Mobile">Mobile-Specific Issue</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="bug-form-group">
                    <label class="bug-form-label">Describe the bug *</label>
                    <textarea class="bug-form-textarea" id="bugDescription" placeholder="Please describe what happened..." required></textarea>
                </div>
                <div class="bug-form-group">
                    <label class="bug-form-label">Your Email (optional)</label>
                    <input type="email" class="bug-form-input" id="bugUserEmail" placeholder="your@email.com">
                </div>
                <div class="bug-form-group">
                    <label class="bug-form-label">Your Name (optional)</label>
                    <input type="text" class="bug-form-input" id="bugUserName" placeholder="Your name">
                </div>
                <button type="submit" class="bug-submit-btn"><i class="fas fa-paper-plane"></i> Submit Bug Report</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="shared.js"></script>
    <script>
        // Session check - redirect to login if not authenticated
        (async function() {
            await vieraAPI.ready;
            if (!vieraAPI.isLoggedIn() || !vieraAPI.getUser()) {
                window.location.href = 'login.html';
                return;
            }
        })();

        // Notification Modal Functions
        function showNotification(message, type = 'success', title = null) {
            const modal = document.getElementById('notificationModal');
            const icon = document.getElementById('notificationIcon');
            const titleEl = document.getElementById('notificationTitle');
            const messageEl = document.getElementById('notificationMessage');

            const defaultTitles = {
                success: 'Success!',
                info: 'Information',
                warning: 'Warning',
                error: 'Error'
            };

            const icons = {
                success: 'fa-check',
                info: 'fa-info',
                warning: 'fa-exclamation',
                error: 'fa-times'
            };

            icon.className = `notification-icon ${type}`;
            icon.innerHTML = `<i class="fas ${icons[type]}"></i>`;
            titleEl.textContent = title || defaultTitles[type] || 'Notification';
            messageEl.textContent = message;
            modal.classList.add('show');
        }

        function closeNotification() {
            document.getElementById('notificationModal').classList.remove('show');
        }

        document.addEventListener('click', function(e) {
            const modal = document.getElementById('notificationModal');
            if (e.target === modal) closeNotification();
        });

        // Confirmation Modal Functions
        let confirmCallback = null;

        function showConfirmation(message, title = 'Confirm Action', type = 'warning') {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirmationModal');
                const icon = document.getElementById('confirmationIcon');
                const titleEl = document.getElementById('confirmationTitle');
                const messageEl = document.getElementById('confirmationMessage');
                const confirmBtn = document.getElementById('confirmButton');

                const icons = {
                    warning: 'fa-exclamation-triangle',
                    danger: 'fa-exclamation-circle',
                    info: 'fa-question-circle'
                };

                const iconColors = {
                    warning: 'warning',
                    danger: 'error',
                    info: 'info'
                };

                icon.className = `notification-icon ${iconColors[type] || 'warning'}`;
                icon.innerHTML = `<i class="fas ${icons[type] || 'fa-exclamation-triangle'}"></i>`;
                titleEl.textContent = title;
                messageEl.textContent = message;

                if (type === 'danger') {
                    confirmBtn.style.background = '#ef4444';
                } else {
                    confirmBtn.style.background = '#3b82f6';
                }

                confirmCallback = resolve;
                modal.classList.add('show');
            });
        }

        function confirmAction() {
            const modal = document.getElementById('confirmationModal');
            modal.classList.remove('show');
            if (confirmCallback) {
                confirmCallback(true);
                confirmCallback = null;
            }
        }

        function cancelConfirmation() {
            const modal = document.getElementById('confirmationModal');
            modal.classList.remove('show');
            if (confirmCallback) {
                confirmCallback(false);
                confirmCallback = null;
            }
        }

        let todos = [];
        let classes = [];
        let currentFilter = 'all';

        // Initialize data from API cache
        function initializeData() {
            todos = vieraAPI.getTodos() || [];
            classes = vieraAPI.getClasses() || [];
        }

        // Log activity via API
        function logActivity(icon, color, title) {
            vieraAPI.logActivity(icon, color, title);
        }

        // Helper function to parse date strings without timezone issues
        function parseLocalDate(dateString) {
            if (!dateString) return null;
            const [year, month, day] = dateString.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for API to be ready (data loaded from cloud)
            await vieraAPI.ready;

            // Only redirect if there's truly no token
            if (!vieraAPI.isLoggedIn()) {
                window.location.href = '/';
                return;
            }

            initializeData();
            populateClassSelect();
            renderTodos();
        });

        function filterTodos(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTodos();
        }

        function renderSubtasks(todo) {
            if (!todo.subtasks || todo.subtasks.length === 0) {
                return `<div class="subtask-section" style="margin-top:6px; padding-left:0; border-left:none;">
                    <div class="subtask-add">
                        <input type="text" placeholder="Add subtask..." class="subtask-input"
                            onkeydown="if(event.key==='Enter') addSubtask('${todo.id}', this)">
                    </div>
                </div>`;
            }
            const done = todo.subtasks.filter(s => s.completed).length;
            return `<div class="subtask-section">
                <div class="subtask-progress">${done}/${todo.subtasks.length} subtasks</div>
                ${todo.subtasks.map(s => `
                    <div class="subtask-item">
                        <input type="checkbox" ${s.completed ? 'checked' : ''}
                            onchange="toggleSubtask('${todo.id}', '${s.id}', this.checked)">
                        <span class="${s.completed ? 'subtask-done' : ''}">${s.text}</span>
                    </div>
                `).join('')}
                <div class="subtask-add">
                    <input type="text" placeholder="Add subtask..." class="subtask-input"
                        onkeydown="if(event.key==='Enter') addSubtask('${todo.id}', this)">
                </div>
            </div>`;
        }

        function toggleSubtask(todoId, subtaskId, checked) {
            const todo = todos.find(t => String(t.id) === String(todoId));
            if (!todo || !todo.subtasks) return;
            const sub = todo.subtasks.find(s => String(s.id) === String(subtaskId));
            if (sub) sub.completed = checked;
            // Auto-complete parent if all subtasks done
            if (todo.subtasks.length > 0 && todo.subtasks.every(s => s.completed)) {
                todo.completed = true;
                todo.updated = new Date().toISOString();
            }
            vieraAPI.setTodos(todos);
            renderTodos();
        }

        function addSubtask(todoId, inputEl) {
            const text = inputEl.value.trim();
            if (!text) return;
            const todo = todos.find(t => String(t.id) === String(todoId));
            if (!todo) return;
            if (!todo.subtasks) todo.subtasks = [];
            todo.subtasks.push({ id: Date.now().toString(), text, completed: false });
            vieraAPI.setTodos(todos);
            inputEl.value = '';
            renderTodos();
        }

        function renderTodos() {
            const container = document.getElementById('todosList');
            let filteredTodos = todos;

            if (currentFilter === 'active') {
                filteredTodos = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(t => t.completed);
            } else if (currentFilter === 'high') {
                filteredTodos = todos.filter(t => t.priority === 'high' && !t.completed);
            }

            if (filteredTodos.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 40px;">No tasks found. Add some tasks to get started!</p>';
                return;
            }

            container.innerHTML = filteredTodos.map(todo => {
                const todoClass = classes.find(c => c.id === todo.classId);
                const subtaskCount = todo.subtasks && todo.subtasks.length > 0
                    ? `<span class="subtask-progress" style="margin-left:4px;">${todo.subtasks.filter(s=>s.completed).length}/${todo.subtasks.length} subtasks</span>`
                    : '';
                return `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}" draggable="true">
                        <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})">
                            ${todo.completed ? '<i class="fas fa-check" style="color: #10b981;"></i>' : ''}
                        </div>
                        <div class="todo-content">
                            <div class="todo-title">${todo.title}</div>
                            <div class="todo-meta">
                                ${todoClass ? `<span class="todo-class" style="background: ${todoClass.color}20; color: ${todoClass.color}"><i class="fas ${todoClass.icon || 'fa-book'}" style="font-size: 12px;"></i> ${todoClass.name}</span>` : ''}
                                <span class="todo-priority ${todo.priority}">
                                    <i class="fas fa-flag"></i>
                                    ${todo.priority.charAt(0).toUpperCase() + todo.priority.slice(1)}
                                </span>
                                ${todo.due ? `<span class="todo-due"><i class="fas fa-calendar" style="color: #06b6d4;"></i> ${parseLocalDate(todo.due).toLocaleDateString()}</span>` : ''}
                                ${subtaskCount}
                            </div>
                            ${renderSubtasks(todo)}
                        </div>
                        <div class="todo-actions">
                            <button class="icon-btn" onclick="editTodo(${todo.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="icon-btn delete" onclick="deleteTodo(${todo.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openTodoModal() {
            populateClassSelect();
            document.getElementById('todoModal').classList.add('active');
            document.getElementById('todoForm').reset();
            document.getElementById('editingTodoId').value = '';
            document.querySelector('.modal-title').textContent = 'Add New Task';
        }

        function closeTodoModal() {
            document.getElementById('todoModal').classList.remove('active');
        }

        function saveTodo(event) {
            event.preventDefault();

            const id = document.getElementById('editingTodoId').value;
            const classId = document.getElementById('todoClass').value;
            const isNew = !id;

            const todoData = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('todoTitle').value,
                description: document.getElementById('todoDescription').value,
                classId: classId ? parseInt(classId) : null,
                priority: document.getElementById('todoPriority').value,
                due: document.getElementById('todoDue').value,
                completed: false,
                created: new Date().toISOString()
            };

            if (id) {
                const index = todos.findIndex(t => t.id === parseInt(id));
                todos[index] = { ...todos[index], ...todoData };
            } else {
                todos.push(todoData);
            }

            vieraAPI.setTodos(todos);

            // Log activity for new tasks
            if (isNew) {
                logActivity('fas fa-plus-circle', 'green', `Added task: ${todoData.title}`);
            }

            // Sync with study schedule if due date is set
            if (todoData.due) {
                syncToSchedule(todoData);
            }

            renderTodos();
            closeTodoModal();
        }

        function populateClassSelect() {
            const select = document.getElementById('todoClass');
            select.innerHTML = '<option value="">Select class</option>';
            classes.forEach(cls => {
                select.innerHTML += `<option value="${cls.id}">${cls.name}</option>`;
            });
        }

        function syncToSchedule(todo) {
            // Get existing events from API
            let events = vieraAPI.getEvents() || [];

            // Check if event already exists for this todo
            const existingEventIndex = events.findIndex(e => e.todoId === todo.id);

            // Get class info for color
            const todoClass = classes.find(c => c.id === todo.classId);

            const eventData = {
                id: existingEventIndex >= 0 ? events[existingEventIndex].id : Date.now(),
                todoId: todo.id,
                title: `📝 ${todo.title}`,
                description: todo.description || '',
                date: todo.due,
                startTime: '09:00',
                endTime: '10:00',
                color: todoClass?.color || '#3b82f6',
                type: 'todo'
            };

            if (existingEventIndex >= 0) {
                events[existingEventIndex] = eventData;
            } else {
                events.push(eventData);
            }

            vieraAPI.setEvents(events);
        }

        function editTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            document.querySelector('.modal-title').textContent = 'Edit Task';
            document.getElementById('todoTitle').value = todo.title;
            document.getElementById('todoDescription').value = todo.description || '';
            document.getElementById('todoClass').value = todo.classId || '';
            document.getElementById('todoPriority').value = todo.priority;
            document.getElementById('todoDue').value = todo.due || '';
            document.getElementById('editingTodoId').value = todo.id;
            document.getElementById('todoModal').classList.add('active');
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                todo.updated = new Date().toISOString();

                // Log activity
                if (todo.completed) {
                    logActivity('fas fa-check-circle', 'green', `Completed task: ${todo.title}`);
                }
                vieraAPI.setTodos(todos);
                renderTodos();
            }
        }

        async function deleteTodo(id) {
            const confirmed = await showConfirmation(
                'This task will be permanently deleted. This action cannot be undone.',
                'Delete Task?',
                'danger'
            );

            if (confirmed) {
                todos = todos.filter(t => t.id !== id);
                vieraAPI.setTodos(todos);

                // Remove from schedule
                let events = vieraAPI.getEvents() || [];
                events = events.filter(e => e.todoId !== id);
                vieraAPI.setEvents(events);

                renderTodos();
                showNotification('Task deleted successfully', 'success', 'Task Deleted');
            }
        }

        // Escape closes modals
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeTodoModal();
                closeBugReportModal();
            }
        });

        // ============ BUG REPORT FUNCTIONALITY ============
        const BUG_REPORT_URL = 'https://script.google.com/macros/s/AKfycbxW5D6i7Td2Em-OqHmCpgy-DVQuzn1oCzn_pBRB2IOb_8MGfwgPqjF8KghYQDZpMNdKUw/exec';

        function openBugReportModal() {
            document.getElementById('bugReportModal').classList.add('active');
            document.getElementById('bugPage').value = window.location.href;
            document.getElementById('bugPageName').textContent = 'To-Do List';

            const user = vieraAPI.getUser();
            if (user) {
                document.getElementById('bugUserEmail').value = user.email || '';
                document.getElementById('bugUserName').value = `${user.firstName || ''} ${user.lastName || ''}`.trim();
            }
        }

        function closeBugReportModal() {
            document.getElementById('bugReportModal').classList.remove('active');
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';
            if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Opera') || ua.includes('OPR')) browser = 'Opera';
            if (/iPhone|iPad|iPod|Android/i.test(ua)) browser += ' (Mobile)';
            return browser;
        }

        async function submitBugReport(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

            const bugData = {
                page: document.getElementById('bugPage').value,
                pageName: 'To-Do List',
                category: document.getElementById('bugCategory').value,
                description: document.getElementById('bugDescription').value,
                userEmail: document.getElementById('bugUserEmail').value || 'Anonymous',
                userName: document.getElementById('bugUserName').value || 'Anonymous',
                browser: getBrowserInfo(),
                screenSize: `${window.innerWidth}x${window.innerHeight}`,
                userAgent: navigator.userAgent
            };

            try {
                await fetch(BUG_REPORT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bugData)
                });
                showNotification('Bug report submitted successfully! Thank you for your feedback.', 'success', 'Report Sent');
                closeBugReportModal();
                document.getElementById('bugDescription').value = '';
                document.getElementById('bugCategory').value = 'General';
            } catch (error) {
                console.error('Bug report error:', error);
                showNotification('Failed to submit bug report. Please try again later.', 'error', 'Error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        document.getElementById('bugReportModal')?.addEventListener('click', function(e) { if (e.target === this) closeBugReportModal(); });
    </script>
</body>
