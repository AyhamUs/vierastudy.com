    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f7f5;
            color: #2e2e2c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
            max-width: 520px;
            width: 100%;
        }

        .error-code {
            font-size: 140px;
            font-weight: 600;
            letter-spacing: -0.04em;
            line-height: 1;
            color: #e0dfdb;
            margin-bottom: 8px;
            position: relative;
        }

        .error-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 44px;
            color: #ecebe8;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #2e2e2c;
        }

        .pro-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f6f6f4;
            color: #73726e;
            padding: 4px 8px;
            border: 1px solid #ecebe8;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .error-title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #2e2e2c;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 15px;
            color: #73726e;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 20px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: #2f80ed;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #1f6fe0;
        }

        .btn-secondary {
            background: #ffffff;
            color: #2e2e2c;
            border: 1px solid #e0dfdb;
        }

        .btn-secondary:hover {
            background: #f6f6f4;
            border-color: #d4d3cf;
        }

        .quick-links {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid #ecebe8;
        }

        .quick-links-title {
            font-size: 12px;
            color: #9b9a96;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quick-links-list {
            display: flex;
            gap: 28px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-link {
            color: #73726e;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-link:hover {
            color: #2f80ed;
        }

        .quick-link i {
            font-size: 15px;
            color: #9b9a96;
        }

        .quick-link:hover i {
            color: #2f80ed;
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 100px;
            }

            .error-title {
                font-size: 23px;
            }

            .error-message {
                font-size: 14px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .quick-links-list {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="vierastudy.png" alt="VieraStudy">
            <span class="logo-text">VieraStudy</span>
        </div>

        <div class="error-code">
            404
            <i class="fas fa-search error-icon"></i>
        </div>

        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            Oops! The page you're looking for seems to have wandered off. 
            It might have been moved, deleted, or never existed in the first place.
        </p>

        <div class="actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i>
                Go to Homepage
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>
                Go Back
            </a>
        </div>

        <div class="quick-links">
            <p class="quick-links-title">Quick Links</p>
            <div class="quick-links-list">
                <a href="flashcards" class="quick-link">
                    <i class="fas fa-layer-group"></i>
                    Flashcards
                </a>
                <a href="schedule" class="quick-link">
                    <i class="fas fa-calendar-alt"></i>
                    Schedule
                </a>
                <a href="notes" class="quick-link">
                    <i class="fas fa-book-open"></i>
                    Notes
                </a>
                <a href="pomodoro" class="quick-link">
                    <i class="fas fa-clock"></i>
                    Pomodoro
                </a>
            </div>
        </div>
    </div>
</body>
</html>
