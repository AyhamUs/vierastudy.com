<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VieraStudy - Notes</title>
    <meta name="description" content="Take organized notes with VieraStudy. Rich text editor, class organization, and smart note management for students.">
    <meta name="keywords" content="VieraStudy, notes, note taking, rich text editor, student notes, organized notes, study notes">
    <link rel="canonical" href="https://vierastudy.com/notes">
    <meta property="og:title" content="VieraStudy - Notes">
    <meta property="og:description" content="Take organized notes with VieraStudy. Rich text editor, class organization, and smart note management for students.">
    <meta property="og:url" content="https://vierastudy.com/notes">
    <meta property="og:image" content="https://vierastudy.com/vierastudy.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="VieraStudy">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VieraStudy - Notes">
    <meta name="twitter:description" content="Take organized notes with VieraStudy. Rich text editor, class organization, and smart note management for students.">
    <meta name="twitter:image" content="https://vierastudy.com/vierastudy.png">
    <link rel="icon" href="vierastudy.png" type="image/png">
    <link rel="stylesheet" href="shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        body.dark-mode .main-content {
            background: var(--bg);
        }

        body.dark-mode .delete-note-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        body.dark-mode .delete-note-btn:hover {
            background: #ef4444;
            color: white;
        }

        body.dark-mode .empty-state {
            background: transparent;
        }

        body.dark-mode .note-editor-container {
            background: var(--bg);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--surface);
            padding: 25px 40px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text);
        }

        .header h1 i {
            color: #06b6d4;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            padding: 10px 40px 10px 15px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            width: 250px;
            background: var(--surface);
            color: var(--text);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
        }

        .add-note-btn {
            background: var(--accent);
            color: var(--accent-contrast);
            flex: 1;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .add-note-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .content-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .notes-sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .notes-filter {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .class-filter {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .class-filter-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .class-filter-item:hover {
            background: var(--surface-2);
        }

        .class-filter-item.active {
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
        }

        .class-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .class-icon-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .note-preview {
            padding: 15px;
            border-radius: var(--radius-xs);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .note-preview:hover {
            background: var(--surface-2);
            border-color: var(--border);
        }

        .note-preview.active {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        .note-preview-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
            font-size: 15px;
        }

        .note-preview-content {
            font-size: 13px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 8px;
        }

        .note-preview-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .note-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            background: var(--surface-2);
            color: var(--text-muted);
        }

        .note-date {
            font-size: 11px;
            color: var(--text-faint);
        }

        .note-editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            overflow: hidden;
        }

        .editor-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .editor-title-input {
            flex: 1;
            font-size: 24px;
            font-weight: 600;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
        }

        .editor-title-input::placeholder {
            color: var(--text-faint);
        }

        .editor-class-select {
            padding: 8px 12px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
        }

        .editor-class-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .editor-toolbar {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--surface);
            border-radius: var(--radius-xs);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .toolbar-btn:hover {
            background: var(--surface-hover);
            color: var(--accent);
        }

        .toolbar-btn.active {
            background: var(--accent);
            color: var(--accent-contrast);
            flex: 1;
        }

        .toolbar-divider {
            width: 1px;
            background: var(--border);
            margin: 0 5px;
        }

        .editor-content {
            flex: 1;
            overflow-y: auto;
        }

        .editor-textarea {
            width: 100%;
            height: 100%;
            padding: 30px;
            border: none;
            font-size: 16px;
            line-height: 1.7;
            resize: none;
            font-family: inherit;
            overflow-y: auto;
        }

        .editor-textarea:focus {
            outline: none;
        }

        .editor-textarea[contenteditable] {
            min-height: 100%;
        }

        .editor-textarea[contenteditable]:empty:before {
            content: attr(data-placeholder);
            color: var(--text-faint);
            pointer-events: none;
        }

        .editor-textarea b,
        .editor-textarea strong {
            font-weight: 700;
        }

        .editor-textarea i,
        .editor-textarea em {
            font-style: italic;
        }

        .editor-textarea u {
            text-decoration: underline;
        }

        .editor-textarea code {
            background-color: var(--surface-2);
            color: var(--text);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .editor-footer {
            padding: 15px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tag-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
        }

        .tag-input {
            padding: 8px 12px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 13px;
            width: 200px;
            background: var(--surface);
            color: var(--text);
        }

        .tag-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .add-tag-btn {
            padding: 8px 16px;
            background: var(--surface-2);
            border: none;
            border-radius: var(--radius-xs);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
        }

        .add-tag-btn:hover {
            background: var(--surface-hover);
        }

        .tags-display {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: var(--radius-xs);
            font-size: 12px;
            font-weight: 600;
        }

        .tag-remove {
            cursor: pointer;
            opacity: 0.7;
        }

        .tag-remove:hover {
            opacity: 1;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
        }

        .save-btn {
            padding: 12px 24px;
            background: var(--accent);
            color: var(--accent-contrast);
            flex: 1;
            border: none;
            border-radius: var(--radius-xs);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .save-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .delete-btn {
            padding: 12px 24px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: var(--radius-xs);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        @media (max-width: 968px) {
            .notes-sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px 20px 20px 75px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .search-input {
                width: 100%;
            }

            .editor-header {
                flex-direction: column;
                align-items: stretch;
            }

            .editor-toolbar {
                padding: 10px 15px;
            }

            .tag-input-container {
                flex-direction: column;
                align-items: stretch;
            }

            .tag-input {
                width: 100%;
            }

            .editor-footer {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px 15px 15px 65px;
            }

            .content {
                padding: 15px;
            }
        }

        /* Bug Report Button */
        .bug-report-btn {
            background: rgba(251, 191, 36, 0.1);
            border: none;
            color: #f59e0b;
            width: 35px;
            height: 35px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 8px;
        }

        .bug-report-btn:hover {
            background: #f59e0b;
            color: white;
        }

        .bug-report-btn i {
            font-size: 14px;
        }

        /* Bug Report Modal */
        .bug-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bug-modal.active {
            display: flex;
        }

        .bug-modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .bug-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .bug-modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bug-modal-title i {
            color: #f59e0b;
        }

        .bug-close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-faint);
            cursor: pointer;
            transition: color 0.3s;
        }

        .bug-close-btn:hover {
            color: #ef4444;
        }

        .bug-form-group {
            margin-bottom: 20px;
        }

        .bug-form-label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .bug-form-input,
        .bug-form-select,
        .bug-form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: var(--surface);
            color: var(--text);
        }

        .bug-form-input:focus,
        .bug-form-select:focus,
        .bug-form-textarea:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .bug-form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .bug-page-info {
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            padding: 12px 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bug-page-info i {
            color: var(--accent);
        }

        .bug-page-info span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .bug-page-info strong {
            color: var(--text);
        }

        .bug-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .bug-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .bug-submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Class badge on note cards */
        .note-class-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 100px;
            margin-top: 6px;
        }

        /* Class filter bar above notes grid */
        .class-filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .class-filter-btn {
            padding: 6px 14px;
            border-radius: 100px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            background: var(--surface-2);
            color: var(--text-muted);
        }

        .class-filter-btn.active {
            background: var(--accent);
            color: var(--accent-contrast);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button><div class="mobile-overlay" onclick="toggleMobileMenu()"></div>

    <div class="container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="header">
                <h1><i class="fas fa-book-open"></i> Notes</h1>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" class="search-input" id="searchInput" placeholder="Search notes..." oninput="searchNotes()">
                        <i class="fas fa-search search-icon"></i>
                    </div>
                    <button class="add-note-btn" onclick="createNewNote()">
                        <i class="fas fa-plus"></i>
                        New Note
                    </button>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="notes-sidebar">
                    <div class="notes-filter">
                        <div class="filter-title">Filter by Class</div>
                        <div class="class-filter" id="classFilter">
                            <!-- Class filters will be rendered here -->
                        </div>
                    </div>
                    <div class="notes-list" id="notesList">
                        <!-- Notes preview will be rendered here -->
                    </div>
                </div>

                <div class="note-editor-container" id="editorContainer">
                    <!-- Empty state or editor will be shown here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon success">
                <i class="fas fa-check" style="color: #10b981;"></i>
            </div>
            <div id="notificationTitle" class="notification-title">Success</div>
            <div id="notificationMessage" class="notification-message">Operation completed successfully!</div>
            <button class="notification-btn" onclick="closeNotification()">OK</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="notification-modal">
        <div class="notification-content">
            <div id="confirmationIcon" class="notification-icon warning">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div id="confirmationTitle" class="notification-title">Confirm Action</div>
            <div id="confirmationMessage" class="notification-message">Are you sure you want to proceed?</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="notification-btn" style="background: #64748b;" onclick="cancelConfirmation()">Cancel</button>
                <button class="notification-btn" id="confirmButton" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Bug Report Modal -->
    <div id="bugReportModal" class="bug-modal">
        <div class="bug-modal-content">
            <div class="bug-modal-header">
                <div class="bug-modal-title"><i class="fas fa-bug"></i> Report a Bug</div>
                <button class="bug-close-btn" onclick="closeBugReportModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="bug-page-info">
                <i class="fas fa-link"></i>
                <span>Reporting from: <strong id="bugPageName">Notes</strong></span>
                <input type="hidden" id="bugPage" value="">
            </div>
            <form onsubmit="submitBugReport(event)">
                <div class="bug-form-group">
                    <label class="bug-form-label">Category</label>
                    <select class="bug-form-select" id="bugCategory" required>
                        <option value="General">General Issue</option>
                        <option value="UI/Design">UI/Design Problem</option>
                        <option value="Functionality">Feature Not Working</option>
                        <option value="Performance">Performance Issue</option>
                        <option value="Login/Account">Login/Account Problem</option>
                        <option value="Data Loss">Data Loss</option>
                        <option value="Mobile">Mobile-Specific Issue</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="bug-form-group">
                    <label class="bug-form-label">Describe the bug *</label>
                    <textarea class="bug-form-textarea" id="bugDescription" placeholder="Please describe what happened..." required></textarea>
                </div>
                <div class="bug-form-group">
                    <label class="bug-form-label">Your Email (optional)</label>
                    <input type="email" class="bug-form-input" id="bugUserEmail" placeholder="your@email.com">
                </div>
                <div class="bug-form-group">
                    <label class="bug-form-label">Your Name (optional)</label>
                    <input type="text" class="bug-form-input" id="bugUserName" placeholder="Your name">
                </div>
                <button type="submit" class="bug-submit-btn"><i class="fas fa-paper-plane"></i> Submit Bug Report</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="shared.js"></script>
    <script>
        // Session check - redirect to login if not authenticated
        (async function() {
            await vieraAPI.ready;
            if (!vieraAPI.isLoggedIn() || !vieraAPI.getUser()) {
                window.location.href = 'login.html';
                return;
            }
        })();
    </script>
    <script>
        let notes = [];
        let classes = [];
        let currentNote = null;
        let currentFilter = null;
        let activeClassFilter = null; // for class filter bar

        // Initialize data from API cache
        function initializeData() {
            notes = vieraAPI.getNotes() || [];
            classes = vieraAPI.getClasses() || [];
        }

        // Log activity via API
        function logActivity(icon, color, title) {
            vieraAPI.logActivity(icon, color, title);
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for API to be ready (data loaded from cloud)
            await vieraAPI.ready;

            // Only redirect if there's truly no token
            if (!vieraAPI.isLoggedIn()) {
                window.location.href = '/';
                return;
            }

            initializeData();
            renderClassFilters();
            renderClassFilterBar();
            renderNotesList();
            if (notes.length > 0) {
                selectNote(notes[0].id);
            } else {
                showEmptyState();
            }
        });

        // Close mobile menu when clicking nav links
        document.addEventListener('DOMContentLoaded', function() {
            const navLinks = document.querySelectorAll('.nav-menu a[href]:not(.dropdown-header)');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        const sidebar = document.querySelector('.sidebar');
                        const overlay = document.querySelector('.mobile-overlay');
                        if (sidebar) sidebar.classList.remove('active');
                        if (overlay) overlay.classList.remove('active');
                    }
                });
            });
        });

        // ============================================
        // CLASS FILTER BAR (above notes grid)
        // ============================================
        function renderClassFilterBar() {
            // Insert filter bar before the content-wrapper if not already present
            let bar = document.getElementById('classFilterBar');
            if (!bar) {
                bar = document.createElement('div');
                bar.id = 'classFilterBar';
                bar.className = 'class-filter-bar';
                bar.style.padding = '16px 30px 0';
                const editorContainer = document.getElementById('editorContainer');
                if (editorContainer && editorContainer.parentNode) {
                    editorContainer.parentNode.insertBefore(bar, editorContainer);
                }
            }

            const allClasses = vieraAPI.getClasses() || [];
            let html = `<button class="class-filter-btn ${activeClassFilter === null ? 'active' : ''}" onclick="setActiveClassFilter(null)">All</button>`;
            allClasses.forEach(c => {
                html += `<button class="class-filter-btn ${activeClassFilter === c.id ? 'active' : ''}"
                    style="${activeClassFilter === c.id ? `background:${c.color||'#3b82f6'};border-color:${c.color||'#3b82f6'};color:white;` : ''}"
                    onclick="setActiveClassFilter(${c.id})">
                    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c.color||'#3b82f6'};margin-right:5px;vertical-align:middle;"></span>${c.name}
                </button>`;
            });
            bar.innerHTML = html;
        }

        function setActiveClassFilter(classId) {
            activeClassFilter = classId;
            renderClassFilterBar();
            renderNotesList();
        }

        // ============================================
        // CLASS DROPDOWN IN EDITOR
        // ============================================
        function populateNoteClassDropdown() {
            const sel = document.getElementById('noteClass');
            if (!sel) return;
            const cls = vieraAPI.getClasses() || [];
            sel.innerHTML = '<option value="">No class</option>' +
                cls.map(c => `<option value="${c.id}" style="color:${c.color||'inherit'}">${c.name}</option>`).join('');
        }

        function renderClassFilters() {
            const container = document.getElementById('classFilter');
            if (!container) return;
            let html = `
                <div class="class-filter-item ${currentFilter === null ? 'active' : ''}" onclick="filterByClass(null)">
                    <i class="fas fa-border-all"></i>
                    <span>All Notes</span>
                </div>
            `;

            classes.forEach(cls => {
                html += `
                    <div class="class-filter-item ${currentFilter === cls.id ? 'active' : ''}" onclick="filterByClass(${cls.id})">
                        <div class="class-icon-dot" style="background: ${cls.color}">
                            <i class="fas ${cls.icon || 'fa-book'}" style="font-size: 10px; color: white;"></i>
                        </div>
                        <span>${cls.name}</span>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function filterByClass(classId) {
            currentFilter = classId;
            renderClassFilters();
            renderNotesList();
        }

        function searchNotes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = notes.filter(note =>
                note.title.toLowerCase().includes(query) ||
                note.content.toLowerCase().includes(query) ||
                note.tags.some(tag => tag.toLowerCase().includes(query))
            );
            renderNotesList(filtered);
        }

        function renderNotesList(filteredNotes = null) {
            const container = document.getElementById('notesList');
            let notesToRender = filteredNotes || notes;

            if (currentFilter !== null && !filteredNotes) {
                notesToRender = notes.filter(n => n.classId === currentFilter);
            }

            // Apply activeClassFilter (filter bar)
            if (activeClassFilter !== null && !filteredNotes) {
                notesToRender = notesToRender.filter(n => n.classId === activeClassFilter);
            }

            if (notesToRender.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 20px;">No notes found</p>';
                return;
            }

            container.innerHTML = notesToRender.map(note => {
                const noteClass = classes.find(c => c.id === note.classId);
                const classBadge = noteClass
                    ? `<span class="note-class-badge" style="background:${noteClass.color}20;color:${noteClass.color}">
                         <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${noteClass.color};"></span>
                         ${noteClass.name}
                       </span>`
                    : '';
                return `
                    <div class="note-preview ${currentNote && currentNote.id === note.id ? 'active' : ''}" onclick="selectNote(${note.id})">
                        <div class="note-preview-title">${note.title || 'Untitled Note'}</div>
                        <div class="note-preview-content">${note.content.substring(0, 60)}${note.content.length > 60 ? '...' : ''}</div>
                        <div class="note-preview-meta">
                            ${noteClass ? `<span class="note-tag" style="background: ${noteClass.color}20; color: ${noteClass.color}">${noteClass.name}</span>` : ''}
                            ${note.tags.map(tag => `<span class="note-tag">#${tag}</span>`).join('')}
                            <span class="note-date">${new Date(note.updated).toLocaleDateString()}</span>
                        </div>
                        ${classBadge}
                    </div>
                `;
            }).join('');
        }

        function createNewNote() {
            const newNote = {
                id: Date.now(),
                title: '',
                content: '',
                classId: null,
                className: null,
                tags: [],
                created: new Date().toISOString(),
                updated: new Date().toISOString()
            };

            notes.unshift(newNote);
            vieraAPI.setNotes(notes);

            // Log activity
            logActivity('fas fa-file-alt', 'cyan', 'Started new note');

            renderNotesList();
            selectNote(newNote.id);
        }

        function selectNote(id) {
            currentNote = notes.find(n => n.id === id);
            if (!currentNote) return;

            renderNotesList();
            showEditor();
        }

        function showEmptyState() {
            const container = document.getElementById('editorContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-book-open"></i>
                    <h3>No notes yet</h3>
                    <p>Create your first note to get started</p>
                </div>
            `;
        }

        function showEditor() {
            const container = document.getElementById('editorContainer');
            const classOptions = classes.map(cls => `
                <option value="${cls.id}" ${currentNote.classId === cls.id ? 'selected' : ''} style="color:${cls.color||'inherit'}">
                    ${cls.name}
                </option>
            `).join('');

            container.innerHTML = `
                <div class="editor-header">
                    <input type="text" class="editor-title-input" id="noteTitle"
                           placeholder="Note Title" value="${currentNote.title}">
                    <select class="editor-class-select" id="noteClass">
                        <option value="">No class</option>
                        ${classOptions}
                    </select>
                </div>

                <div class="editor-toolbar">
                    <button class="toolbar-btn" onclick="formatText('bold')" title="Bold" id="boldBtn">
                        <i class="fas fa-bold"></i>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('italic')" title="Italic" id="italicBtn">
                        <i class="fas fa-italic"></i>
                    </button>
                    <button class="toolbar-btn" onclick="formatText('underline')" title="Underline" id="underlineBtn">
                        <i class="fas fa-underline"></i>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" onclick="insertList()" title="Bullet List" id="listBtn">
                        <i class="fas fa-list-ul"></i>
                    </button>
                    <button class="toolbar-btn" onclick="insertNumberedList()" title="Numbered List" id="numberedListBtn">
                        <i class="fas fa-list-ol"></i>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button class="toolbar-btn" onclick="insertHeading()" title="Heading" id="headingBtn">
                        <i class="fas fa-heading"></i>
                    </button>
                    <button class="toolbar-btn" onclick="insertCode()" title="Code" id="codeBtn">
                        <i class="fas fa-code"></i>
                    </button>
                </div>

                <div class="editor-content">
                    <div class="editor-textarea" id="noteContent"
                         contenteditable="true"
                         data-placeholder="Start writing your notes..."
                         onkeyup="updateToolbarStates()"
                         onmouseup="updateToolbarStates()">${currentNote.content}</div>
                </div>

                <div class="editor-footer">
                    <div class="tag-input-container">
                        <input type="text" class="tag-input" id="tagInput"
                               placeholder="Add tag..." onkeypress="handleTagKeypress(event)">
                        <button class="add-tag-btn" onclick="addTag()">
                            <i class="fas fa-plus"></i> Add Tag
                        </button>
                        <div class="tags-display" id="tagsDisplay">
                            ${currentNote.tags.map(tag => `
                                <span class="tag-item">
                                    #${tag}
                                    <span class="tag-remove" onclick="removeTag('${tag}')">×</span>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                    <div class="editor-actions">
                        <button class="save-btn" onclick="saveNote()">
                            <i class="fas fa-save"></i> Save
                        </button>
                        <button class="delete-btn" onclick="deleteNote()">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
        }

        function saveNote(showAlert = true) {
            if (!currentNote) return;

            currentNote.title = document.getElementById('noteTitle').value;
            currentNote.content = document.getElementById('noteContent').innerHTML;
            const classId = document.getElementById('noteClass').value;
            currentNote.classId = classId ? parseInt(classId) : null;

            // Store className too
            if (currentNote.classId) {
                const foundClass = classes.find(c => c.id === currentNote.classId);
                currentNote.className = foundClass ? foundClass.name : null;
            } else {
                currentNote.className = null;
            }

            currentNote.updated = new Date().toISOString();

            const index = notes.findIndex(n => n.id === currentNote.id);
            notes[index] = currentNote;

            vieraAPI.setNotes(notes);
            renderNotesList();

            if (showAlert) {
                showNotification('Your note has been saved successfully!', 'success', 'Note Saved');
            }
        }

        async function deleteNote() {
            if (!currentNote) return;

            const confirmed = await showConfirmation(
                'This note will be permanently deleted. This action cannot be undone.',
                'Delete Note?',
                'danger'
            );

            if (!confirmed) return;

            notes = notes.filter(n => n.id !== currentNote.id);
            vieraAPI.setNotes(notes);

            renderNotesList();
            if (notes.length > 0) {
                selectNote(notes[0].id);
            } else {
                showEmptyState();
            }

            showNotification('Note deleted successfully', 'success', 'Note Deleted');
        }

        function addTag() {
            const input = document.getElementById('tagInput');
            const tag = input.value.trim().replace('#', '');

            if (tag && !currentNote.tags.includes(tag)) {
                currentNote.tags.push(tag);
                input.value = '';
                saveNote(false);
                showEditor();
            }
        }

        function handleTagKeypress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                addTag();
            }
        }

        function removeTag(tag) {
            currentNote.tags = currentNote.tags.filter(t => t !== tag);
            saveNote(false);
            showEditor();
        }

        function formatText(command) {
            const editor = document.getElementById('noteContent');

            if (document.activeElement !== editor) {
                editor.focus();
            }

            const selection = window.getSelection();
            if (selection.rangeCount === 0) {
                editor.focus();
            }

            document.execCommand(command, false, null);
            editor.focus();
            updateToolbarStates();
            autoSaveNote();
        }

        function updateToolbarStates() {
            const buttons = document.querySelectorAll('.toolbar-btn');

            const isBold = document.queryCommandState('bold');
            const isItalic = document.queryCommandState('italic');
            const isUnderline = document.queryCommandState('underline');
            const isUnorderedList = document.queryCommandState('insertUnorderedList');
            const isOrderedList = document.queryCommandState('insertOrderedList');

            buttons.forEach(btn => {
                const title = btn.getAttribute('title');
                btn.classList.remove('active');

                if (title === 'Bold' && isBold) btn.classList.add('active');
                if (title === 'Italic' && isItalic) btn.classList.add('active');
                if (title === 'Underline' && isUnderline) btn.classList.add('active');
                if (title === 'Bullet List' && isUnorderedList) btn.classList.add('active');
                if (title === 'Numbered List' && isOrderedList) btn.classList.add('active');
            });
        }

        function insertList() {
            const editor = document.getElementById('noteContent');
            editor.focus();
            document.execCommand('insertUnorderedList', false, null);
            updateToolbarStates();
            autoSaveNote();
        }

        function insertNumberedList() {
            const editor = document.getElementById('noteContent');
            editor.focus();
            document.execCommand('insertOrderedList', false, null);
            updateToolbarStates();
            autoSaveNote();
        }

        function insertHeading() {
            const editor = document.getElementById('noteContent');
            editor.focus();
            document.execCommand('formatBlock', false, 'h2');
            autoSaveNote();
        }

        function insertCode() {
            const editor = document.getElementById('noteContent');
            editor.focus();
            const selection = window.getSelection();
            const selectedText = selection.toString();
            const code = document.createElement('code');
            code.textContent = selectedText || 'code here';

            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(code);
            }
            autoSaveNote();
        }

        // ============================================
        // AUTO-SAVE INDICATOR
        // ============================================
        let saveIndicator;

        function showSaveIndicator(status = 'saving') {
            if (!saveIndicator) {
                saveIndicator = document.createElement('div');
                saveIndicator.style.cssText = `
                    position: fixed;
                    bottom: 30px;
                    right: 30px;
                    background: ${document.body.classList.contains('dark-mode') ? '#1e293b' : 'white'};
                    color: ${document.body.classList.contains('dark-mode') ? '#e2e8f0' : '#1e293b'};
                    padding: 12px 20px;
                    border-radius: 12px;
                    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    font-size: 14px;
                    font-weight: 500;
                    z-index: 10000;
                    transition: all 0.3s ease;
                    opacity: 0;
                    transform: translateY(10px);
                    border: 1px solid ${document.body.classList.contains('dark-mode') ? '#334155' : '#e2e8f0'};
                `;
                document.body.appendChild(saveIndicator);
            }

            if (status === 'saving') {
                saveIndicator.innerHTML = `
                    <div style="width: 16px; height: 16px; border: 2px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite;"></div>
                    <span>Saving...</span>
                    <style>
                        @keyframes spin {
                            to { transform: rotate(360deg); }
                        }
                    </style>
                `;
                saveIndicator.style.opacity = '1';
                saveIndicator.style.transform = 'translateY(0)';
            } else if (status === 'saved') {
                saveIndicator.innerHTML = `
                    <i class="fas fa-check" style="color: #10b981;"></i>
                    <span>Saved</span>
                `;
                saveIndicator.style.opacity = '1';
                saveIndicator.style.transform = 'translateY(0)';

                setTimeout(() => {
                    saveIndicator.style.opacity = '0';
                    saveIndicator.style.transform = 'translateY(10px)';
                }, 2000);
            } else if (status === 'error') {
                saveIndicator.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i>
                    <span>Save failed</span>
                `;
                saveIndicator.style.opacity = '1';
                saveIndicator.style.transform = 'translateY(0)';

                setTimeout(() => {
                    saveIndicator.style.opacity = '0';
                    saveIndicator.style.transform = 'translateY(10px)';
                }, 3000);
            }
        }

        // Enhance autoSaveNote from shared.js with indicator
        const _origAutoSave = typeof autoSaveNote !== 'undefined' ? autoSaveNote : null;
        if (_origAutoSave) {
            autoSaveNote = function() {
                showSaveIndicator('saving');
                try {
                    _origAutoSave();
                    setTimeout(() => showSaveIndicator('saved'), 500);
                } catch (error) {
                    console.error('Save error:', error);
                    showSaveIndicator('error');
                }
            };
        }

        // ============ BUG REPORT FUNCTIONALITY ============
        const BUG_REPORT_URL = 'https://script.google.com/macros/s/AKfycbxW5D6i7Td2Em-OqHmCpgy-DVQuzn1oCzn_pBRB2IOb_8MGfwgPqjF8KghYQDZpMNdKUw/exec';

        function openBugReportModal() {
            document.getElementById('bugReportModal').classList.add('active');
            document.getElementById('bugPage').value = window.location.href;
            document.getElementById('bugPageName').textContent = 'Notes';

            const user = vieraAPI.getUser();
            if (user) {
                document.getElementById('bugUserEmail').value = user.email || '';
                document.getElementById('bugUserName').value = `${user.firstName || ''} ${user.lastName || ''}`.trim();
            }
        }

        function closeBugReportModal() {
            document.getElementById('bugReportModal').classList.remove('active');
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';
            if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            else if (ua.includes('Opera') || ua.includes('OPR')) browser = 'Opera';
            if (/iPhone|iPad|iPod|Android/i.test(ua)) browser += ' (Mobile)';
            return browser;
        }

        async function submitBugReport(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

            const bugData = {
                page: document.getElementById('bugPage').value,
                pageName: 'Notes',
                category: document.getElementById('bugCategory').value,
                description: document.getElementById('bugDescription').value,
                userEmail: document.getElementById('bugUserEmail').value || 'Anonymous',
                userName: document.getElementById('bugUserName').value || 'Anonymous',
                browser: getBrowserInfo(),
                screenSize: `${window.innerWidth}x${window.innerHeight}`,
                userAgent: navigator.userAgent
            };

            try {
                await fetch(BUG_REPORT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bugData)
                });
                showNotification('Bug report submitted successfully! Thank you for your feedback.', 'success', 'Report Sent');
                closeBugReportModal();
                document.getElementById('bugDescription').value = '';
                document.getElementById('bugCategory').value = 'General';
            } catch (error) {
                console.error('Bug report error:', error);
                showNotification('Failed to submit bug report. Please try again later.', 'error', 'Error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeBugReportModal(); });
        document.getElementById('bugReportModal')?.addEventListener('click', function(e) { if (e.target === this) closeBugReportModal(); });
    </script>
</body>
</html>
