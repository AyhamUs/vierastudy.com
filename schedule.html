<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>VieraStudy - Study Schedule</title>
    <meta name="description" content="Plan your study schedule with VieraStudy. Calendar view, event management, and smart scheduling for students.">
    <meta name="keywords" content="VieraStudy, study schedule, calendar, event planner, time management, student calendar, academic planning">
    <link rel="canonical" href="https://vierastudy.com/schedule">
    <!-- Open Graph Tags -->
    <meta property="og:title" content="VieraStudy - Study Schedule">
    <meta property="og:description" content="Plan your study schedule with VieraStudy. Calendar view, event management, and smart scheduling for students.">
    <meta property="og:url" content="https://vierastudy.com/schedule">
    <meta property="og:image" content="https://vierastudy.com/vierastudy.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="VieraStudy">
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VieraStudy - Study Schedule">
    <meta name="twitter:description" content="Plan your study schedule with VieraStudy. Calendar view, event management, and smart scheduling for students.">
    <meta name="twitter:image" content="https://vierastudy.com/vierastudy.png">
    <link rel="icon" href="vierastudy.png" type="image/png">
    <link rel="stylesheet" href="shared.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        body.dark-mode .event-item {
            border-left-color: var(--accent);
        }

        body.dark-mode .event-color {
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        body.dark-mode .events-list {
            box-shadow: var(--shadow-md);
        }

        body.dark-mode .empty-state i {
            opacity: 0.5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
        }

        .header {
            background: var(--surface);
            padding: 25px 40px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: #f59e0b;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-muted);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .content {
            padding: 40px;
        }

        /* Calendar View Toggle */
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--surface);
            padding: 8px;
            border-radius: var(--radius-xs);
            width: fit-content;
        }

        .view-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .view-btn.active {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        /* Calendar */
        .calendar-container {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow-sm);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .calendar-header h2 {
            font-size: 24px;
            color: var(--text);
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-nav button {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .calendar-nav button:hover {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
            padding: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            grid-auto-rows: auto; /* allow rows to grow with content so wrapped events are visible */
        }

        .calendar-day {
            /* avoid forcing perfect squares which can cause layout issues on small screens */
            border: 2px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .calendar-day:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .calendar-day.other-month {
            opacity: 0.3;
        }

        .calendar-day.today {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .calendar-day.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-contrast);
        }

        .day-number {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 4px;
            /* allow events to expand the cell so wrapped text is readable */
        }

        .event-dot {
            width: 100%;
            min-height: 20px;
            border-radius: 4px;
            font-size: 11px;
            padding: 4px 6px;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
            display: block;
            box-sizing: border-box;
            max-width: 100%;
            white-space: normal; /* allow wrapping */
            overflow-wrap: anywhere; /* break long words */
            word-break: break-word;
            overflow: hidden;
            position: relative;
        }

        .event-dot .delete-btn {
            position: absolute;
            top: 2px;
            right: 4px;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.18);
            color: white;
            border-radius: 50%;
            font-size: 11px;
            cursor: pointer;
            border: none;
            padding: 0;
            line-height: 1;
        }

        .event-dot .delete-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .event-dot:hover {
            opacity: 0.9;
            transform: translateX(2px);
        }

        /* Month View */
        .month-view {
            display: none;
        }

        .month-view.active {
            display: block;
        }

        /* Week View */
        .week-view {
            display: none;
        }

        .week-view.active {
            display: block;
        }

        .week-grid {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        /* Ensure visible vertical separators between day columns in week view */
        .week-grid > .day-header,
        .week-grid > .time-slot {
            border-left: 1px solid var(--border);
        }

        /* Remove left border for the time labels column */
        .week-grid > .time-label {
            border-left: none;
        }

        .time-slot {
            background: var(--surface);
            padding: 15px;
            min-height: 80px;
            position: relative;
        }

        .time-label {
            background: var(--surface-2);
            padding: 15px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day-header {
            background: var(--surface-2);
            padding: 15px;
            text-align: center;
            font-weight: 600;
            color: var(--text);
        }

        .day-header.today {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        .time-slot:hover {
            background: rgba(59, 130, 246, 0.05);
            cursor: pointer;
        }

        /* Event in time slot */
        .event-block {
            background: var(--accent);
            color: var(--accent-contrast);
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            margin: 2px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .event-block:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .event-block .event-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .event-block .event-time {
            font-size: 10px;
            opacity: 0.9;
        }

        /* Event Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 20px;
                width: 95%;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-size: 24px;
            color: var(--text);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-faint);
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-strong);
            border-radius: var(--radius-xs);
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-option.selected {
            border-color: var(--text);
            transform: scale(1.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* List View */
        .list-view {
            display: none;
        }

        .list-view.active {
            display: block;
        }

        .events-list {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .event-item {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .event-item:hover {
            background: var(--surface-hover);
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-color {
            width: 8px;
            height: 60px;
            border-radius: 4px;
        }

        .event-details {
            flex: 1;
        }

        .event-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
            margin-bottom: 5px;
        }

        .event-info {
            color: var(--text-muted);
            font-size: 14px;
        }

        .event-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--surface-2);
            border-radius: var(--radius-xs);
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: var(--accent);
            color: var(--accent-contrast);
        }

        .icon-btn.delete:hover {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-faint);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 999;
                transition: left 0.3s ease;
                width: 280px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .sidebar.active {
                left: 0;
            }

            .mobile-menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .mobile-overlay {
                display: block;
            }

            .header {
                padding: 20px 20px 20px 75px;
            }

            .header h1 {
                font-size: 20px;
            }

            .content {
                padding: 20px;
            }

            .calendar-day {
                min-height: 70px;
                padding: 6px;
            }

            .day-number {
                font-size: 12px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .week-grid {
                overflow-x: auto;
            }

            .ai-dropdown.open .dropdown-content,
            .math-dropdown.open .dropdown-content {
                max-height: 500px;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .dropdown-item {
                min-height: 44px;
                touch-action: manipulation;
            }

            .dropdown-item:hover {
                padding-left: 35px;
            }

            .nav-item {
                padding: 16px 25px;
                min-height: 48px;
                touch-action: manipulation;
            }

            .nav-menu a {
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.1);
            }

            .btn,
            button {
                min-height: 44px;
                touch-action: manipulation;
            }

            .calendar-container {
                padding: 15px;
            }

            .weekdays {
                gap: 4px;
            }

            .weekday {
                font-size: 11px;
                padding: 8px 2px;
            }

            .calendar-grid {
                gap: 4px;
            }

            .calendar-day {
                min-height: 60px;
                padding: 4px;
                aspect-ratio: auto;
                border-radius: 8px;
            }

            .day-number {
                font-size: 11px;
                margin-bottom: 4px;
            }

            .event-dot {
                font-size: 9px;
                padding: 2px 4px;
                min-height: 16px;
            }

            .calendar-header h2 {
                font-size: 18px;
            }

            .calendar-nav button {
                width: 32px;
                height: 32px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px 15px 15px 65px;
            }

            .mobile-menu-toggle {
                width: 44px;
                height: 44px;
            }

            .content {
                padding: 15px;
            }

            .calendar-container {
                padding: 10px;
            }

            .weekdays {
                gap: 2px;
            }

            .weekday {
                font-size: 10px;
                padding: 6px 1px;
            }

            .calendar-grid {
                gap: 2px;
            }

            .calendar-day {
                min-height: 50px;
                padding: 3px;
            }

            .day-number {
                font-size: 10px;
            }

            .event-dot {
                font-size: 8px;
                padding: 1px 3px;
                min-height: 14px;
            }

            .calendar-header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .calendar-header h2 {
                font-size: 16px;
            }
        }

        /* Bug Report Button */
        .bug-report-btn { background: rgba(251, 191, 36, 0.1); border: none; color: #f59e0b; width: 35px; height: 35px; border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; margin-right: 8px; }
        .bug-report-btn:hover { background: #f59e0b; color: white; }
        .bug-report-btn i { font-size: 14px; }
        .bug-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .bug-modal.active { display: flex; }
        .bug-modal-content { background: var(--surface); border-radius: var(--radius); padding: 30px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .bug-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bug-modal-title { font-size: 22px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .bug-modal-title i { color: #f59e0b; }
        .bug-close-btn { background: none; border: none; font-size: 24px; color: var(--text-faint); cursor: pointer; }
        .bug-close-btn:hover { color: #ef4444; }
        .bug-form-group { margin-bottom: 20px; }
        .bug-form-label { display: block; font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 14px; }
        .bug-form-input, .bug-form-select, .bug-form-textarea { width: 100%; padding: 12px 14px; border: 2px solid var(--border-strong); border-radius: var(--radius-xs); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); }
        .bug-form-input:focus, .bug-form-select:focus, .bug-form-textarea:focus { outline: none; border-color: #f59e0b; }
        .bug-form-textarea { resize: vertical; min-height: 120px; }
        .bug-page-info { background: var(--surface-2); border-radius: var(--radius-xs); padding: 12px 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .bug-page-info i { color: var(--accent); }
        .bug-page-info span { font-size: 13px; color: var(--text-muted); }
        .bug-page-info strong { color: var(--text); }
        .bug-submit-btn { width: 100%; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; border: none; padding: 14px; border-radius: var(--radius-xs); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bug-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
        .bug-submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button><div class="mobile-overlay" onclick="toggleMobileMenu()"></div>

    <div class="container">
        <div class="sidebar"></div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="header">
                <h1><i class="fas fa-calendar-alt"></i> Study Schedule</h1>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="goToToday()">
                        <i class="fas fa-calendar-day"></i>
                        Today
                    </button>
                    <button class="btn btn-primary" onclick="openEventModal()">
                        <i class="fas fa-plus"></i>
                        New Event
                    </button>
                </div>
            </div>
            
            <div class="content">
                <!-- View Toggle -->
                <div class="view-toggle">
                    <button class="view-btn active" onclick="switchView('month')">
                        <i class="fas fa-calendar" style="color: #06b6d4;"></i> Month
                    </button>
                    <button class="view-btn" onclick="switchView('week')">
                        <i class="fas fa-calendar-week" style="color: #8b5cf6;"></i> Week
                    </button>
                    <button class="view-btn" onclick="switchView('list')">
                        <i class="fas fa-list" style="color: #f97316;"></i> List
                    </button>
                </div>

                <!-- Month View -->
                <div id="monthView" class="month-view active">
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <h2 id="currentMonth">November 2025</h2>
                            <div class="calendar-nav">
                                <button onclick="previousMonth()">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button onclick="nextMonth()">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="weekdays">
                            <div class="weekday">Sun</div>
                            <div class="weekday">Mon</div>
                            <div class="weekday">Tue</div>
                            <div class="weekday">Wed</div>
                            <div class="weekday">Thu</div>
                            <div class="weekday">Fri</div>
                            <div class="weekday">Sat</div>
                        </div>
                        
                        <div class="calendar-grid" id="calendarGrid"></div>
                    </div>
                </div>

                <!-- Week View -->
                <div id="weekView" class="week-view">
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <h2 id="currentWeek">Week of Nov 10, 2025</h2>
                            <div class="calendar-nav">
                                <button onclick="previousWeek()">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button onclick="nextWeek()">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                        <div id="weekGrid" class="week-grid"></div>
                    </div>
                </div>

                <!-- List View -->
                <div id="listView" class="list-view">
                    <div id="eventsList" class="events-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Study Session</h2>
                <button class="close-btn" onclick="closeEventModal()">
                    <i class="fas fa-times" style="color: #6b7280;"></i>
                </button>
            </div>
            
            <form id="eventForm" onsubmit="saveEvent(event)">
                <div class="form-group">
                    <label class="form-label">Event Title <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-input" id="eventTitle" required placeholder="e.g., Study Session - Biology">
                </div>

                <div class="form-group">
                    <label class="form-label">Class</label>
                    <select class="form-select" id="eventClass">
                        <option value="">Select class (optional)</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Date <span style="color: #ef4444;">*</span></label>
                        <input type="date" class="form-input" id="eventDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Duration</label>
                        <select class="form-select" id="eventDuration">
                            <option value="30">30 minutes</option>
                            <option value="60" selected>1 hour</option>
                            <option value="90">1.5 hours</option>
                            <option value="120">2 hours</option>
                            <option value="180">3 hours</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Start Time <span style="color: #ef4444;">*</span></label>
                        <input type="time" class="form-input" id="eventStartTime" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">End Time</label>
                        <input type="time" class="form-input" id="eventEndTime" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Recurrence</label>
                    <select class="form-select" id="eventRecurrence">
                        <option value="none">None</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="biweekly">Biweekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="eventDescription" placeholder="What will you study?"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Color</label>
                    <div class="color-options" id="colorOptions"></div>
                </div>

                <input type="hidden" id="editingEventId" value="">
                
                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i>
                        Save Event
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeEventModal()">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="notification-modal">
        <div class="notification-content">
            <div id="notificationIcon" class="notification-icon success">
                <i class="fas fa-check" style="color: #10b981;"></i>
            </div>
            <div id="notificationTitle" class="notification-title">Success</div>
            <div id="notificationMessage" class="notification-message">Operation completed successfully!</div>
            <button class="notification-btn" onclick="closeNotification()">OK</button>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmationModal" class="notification-modal">
        <div class="notification-content">
            <div id="confirmationIcon" class="notification-icon warning">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div id="confirmationTitle" class="notification-title">Confirm Action</div>
            <div id="confirmationMessage" class="notification-message">Are you sure you want to proceed?</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="notification-btn" style="background: #64748b;" onclick="cancelConfirmation()">Cancel</button>
                <button class="notification-btn" id="confirmButton" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let events = [];
        let classes = [];
        let currentDate = new Date();
        let currentView = 'month';
        let selectedColor = '#3b82f6';

        // Initialize data from API cache
        function initializeData() {
            events = vieraAPI.getEvents() || [];
            classes = vieraAPI.getClasses() || [];
        }

        // Log activity via API
        function logActivity(icon, color, title) {
            vieraAPI.logActivity(icon, color, title);
        }

        const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9'];

        function init() {
            populateClassSelect();
            populateColorOptions();
            updateEventTimes();
            
            // Set today's date as default
            const today = new Date();
            document.getElementById('eventDate').valueAsDate = today;
            
            // Initialize with month view
            const monthView = document.getElementById('monthView');
            const weekView = document.getElementById('weekView');
            const listView = document.getElementById('listView');
            
            monthView.style.display = 'block';
            weekView.style.display = 'none';
            listView.style.display = 'none';
            
            renderMonthView();
        }

        function populateClassSelect() {
            const select = document.getElementById('eventClass');
            select.innerHTML = '<option value="">Select class (optional)</option>';

            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.id;
                option.textContent = cls.name;
                option.dataset.color = cls.color;
                select.appendChild(option);
            });
        }

        function populateClassDropdown() {
            const sel = document.getElementById('eventClass');
            if (!sel) return;
            const cls = vieraAPI.getClasses() || [];
            sel.innerHTML = '<option value="">No class</option>' +
                cls.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function getEventInstances(event, viewStart, viewEnd) {
            const instances = [];
            const startDate = new Date(event.date + 'T00:00:00');
            if (!event.recurrence || event.recurrence === 'none') {
                if (startDate >= viewStart && startDate <= viewEnd) instances.push(event.date);
                return instances;
            }
            const intervals = { daily: 1, weekly: 7, biweekly: 14, monthly: 30 };
            const stepDays = intervals[event.recurrence] || 7;
            let cur = new Date(startDate);
            const maxDate = new Date(viewEnd);
            maxDate.setFullYear(maxDate.getFullYear() + 1);
            while (cur <= maxDate && instances.length < 52) {
                if (cur >= viewStart) instances.push(cur.toISOString().split('T')[0]);
                cur = new Date(cur);
                cur.setDate(cur.getDate() + stepDays);
            }
            return instances;
        }

        function populateColorOptions() {
            const container = document.getElementById('colorOptions');
            container.innerHTML = '';
            
            colors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'color-option';
                if (color === selectedColor) div.classList.add('selected');
                div.style.background = color;
                div.onclick = () => selectColor(color);
                container.appendChild(div);
            });
        }

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.style.background === color) {
                    opt.classList.add('selected');
                }
            });
        }

        function updateEventTimes() {
            const startTime = document.getElementById('eventStartTime');
            const duration = document.getElementById('eventDuration');
            const endTime = document.getElementById('eventEndTime');
            
            function calculate() {
                if (startTime.value) {
                    const [hours, minutes] = startTime.value.split(':');
                    const start = new Date();
                    start.setHours(parseInt(hours), parseInt(minutes));
                    
                    const end = new Date(start.getTime() + parseInt(duration.value) * 60000);
                    endTime.value = end.toTimeString().slice(0, 5);
                }
            }
            
            startTime.addEventListener('change', calculate);
            duration.addEventListener('change', calculate);
        }

        function switchView(view) {
            currentView = view;
            
            // Update button states
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Find and activate the clicked button
            const clickedBtn = Array.from(document.querySelectorAll('.view-btn')).find(btn => {
                const text = btn.textContent.toLowerCase();
                return text.includes(view);
            });
            if (clickedBtn) {
                clickedBtn.classList.add('active');
            }
            
            // Hide all views first
            const monthView = document.getElementById('monthView');
            const weekView = document.getElementById('weekView');
            const listView = document.getElementById('listView');
            
            monthView.style.display = 'none';
            weekView.style.display = 'none';
            listView.style.display = 'none';
            
            monthView.classList.remove('active');
            weekView.classList.remove('active');
            listView.classList.remove('active');
            
            // Show and render the selected view
            if (view === 'month') {
                monthView.style.display = 'block';
                monthView.classList.add('active');
                renderMonthView();
            } else if (view === 'week') {
                weekView.style.display = 'block';
                weekView.classList.add('active');
                renderWeekView();
            } else if (view === 'list') {
                listView.style.display = 'block';
                listView.classList.add('active');
                renderListView();
            }
        }

        function renderMonthView() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                const cell = createDayCell(day, true);
                grid.appendChild(cell);
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const cell = createDayCell(day, false, date);
                
                // Check if today
                const today = new Date();
                if (date.toDateString() === today.toDateString()) {
                    cell.classList.add('today');
                }
                
                // Add events
                const dayEvents = getEventsForDate(date);
                const eventsContainer = cell.querySelector('.day-events');
                dayEvents.slice(0, 3).forEach(event => {
                    const dot = document.createElement('div');
                    dot.className = 'event-dot';
                    dot.style.background = event.color;
                    dot.style.color = 'white';
                    dot.style.cursor = 'pointer';
                    dot.style.display = 'flex';
                    dot.style.alignItems = 'center';
                    dot.style.padding = '6px 28px 6px 6px';
                    dot.style.borderRadius = '4px';

                    const titleSpan = document.createElement('div');
                    titleSpan.style.flex = '1';
                    titleSpan.style.fontSize = '11px';
                    titleSpan.style.lineHeight = '1.1';
                    titleSpan.innerHTML = (event.recurrence && event.recurrence !== 'none'
                        ? '<i class="fas fa-repeat" style="font-size:9px;margin-right:3px;opacity:0.85;"></i>' : '')
                        + event.title;
                    titleSpan.onclick = (e) => { e.stopPropagation(); editEvent(event.id); };

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.title = 'Delete';
                    delBtn.innerHTML = '&times;';
                    delBtn.onclick = (e) => { e.stopPropagation(); deleteEvent(event.id); };

                    dot.appendChild(titleSpan);
                    dot.appendChild(delBtn);
                    eventsContainer.appendChild(dot);
                });
                
                if (dayEvents.length > 3) {
                    const more = document.createElement('div');
                    more.style.fontSize = '10px';
                    more.style.color = '#64748b';
                    more.style.marginTop = '2px';
                    more.style.cursor = 'pointer';
                    more.textContent = `+${dayEvents.length - 3} more`;
                    more.onclick = (e) => {
                        e.stopPropagation();
                        // Show all events for this day in a list
                        showDayEvents(date, dayEvents);
                    };
                    eventsContainer.appendChild(more);
                }
                
                grid.appendChild(cell);
            }
            
            // Next month days
            const totalCells = grid.children.length;
            const remainingCells = 42 - totalCells;
            for (let day = 1; day <= remainingCells; day++) {
                const cell = createDayCell(day, true);
                grid.appendChild(cell);
            }
        }

        function createDayCell(day, otherMonth, date = null) {
            const cell = document.createElement('div');
            cell.className = 'calendar-day';
            if (otherMonth) cell.classList.add('other-month');
            
            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = day;
            
            const eventsContainer = document.createElement('div');
            eventsContainer.className = 'day-events';
            
            cell.appendChild(dayNumber);
            cell.appendChild(eventsContainer);
            
            if (date && !otherMonth) {
                cell.onclick = () => openEventModal(date);
            }
            
            return cell;
        }

        // Helper function to parse date strings without timezone issues
        function parseLocalDate(dateString) {
            const [year, month, day] = dateString.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        function getEventsForDate(date) {
            const dateStr = date.getFullYear() + '-' +
                String(date.getMonth() + 1).padStart(2, '0') + '-' +
                String(date.getDate()).padStart(2, '0');
            const viewStart = new Date(date); viewStart.setHours(0,0,0,0);
            const viewEnd = new Date(date); viewEnd.setHours(23,59,59,999);
            return events.filter(event => {
                const instances = getEventInstances(event, viewStart, viewEnd);
                return instances.includes(dateStr);
            });
        }

        function renderWeekView() {
            const weekStart = getWeekStart(currentDate);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            
            document.getElementById('currentWeek').textContent = 
                `Week of ${weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
            
            const grid = document.getElementById('weekGrid');
            grid.innerHTML = '';
            
            // Header row
            const emptyHeader = document.createElement('div');
            emptyHeader.className = 'time-label';
            grid.appendChild(emptyHeader);
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(date.getDate() + i);
                
                const header = document.createElement('div');
                header.className = 'day-header';
                
                const today = new Date();
                if (date.toDateString() === today.toDateString()) {
                    header.classList.add('today');
                }
                
                header.innerHTML = `
                    <div>${date.toLocaleDateString('en-US', { weekday: 'short' })}</div>
                    <div style="font-size: 20px; margin-top: 5px;">${date.getDate()}</div>
                `;
                grid.appendChild(header);
            }
            
            // Time slots (8 AM to 8 PM)
            for (let hour = 8; hour <= 20; hour++) {
                const timeLabel = document.createElement('div');
                timeLabel.className = 'time-label';
                timeLabel.textContent = `${hour > 12 ? hour - 12 : hour}${hour >= 12 ? 'PM' : 'AM'}`;
                grid.appendChild(timeLabel);
                
                for (let day = 0; day < 7; day++) {
                    const date = new Date(weekStart);
                    date.setDate(date.getDate() + day);
                    
                    const slot = document.createElement('div');
                    slot.className = 'time-slot';
                    slot.onclick = () => {
                        date.setHours(hour, 0);
                        openEventModal(date);
                    };
                    
                    // Add events in this time slot
                    const slotEvents = getEventsForTimeSlot(date, hour);
                    slotEvents.forEach(event => {
                        const block = document.createElement('div');
                        block.className = 'event-block';
                        block.style.background = event.color;
                        block.innerHTML = `
                            <div class="event-title">${(event.recurrence && event.recurrence !== 'none') ? '<i class="fas fa-repeat" style="font-size:10px;margin-right:3px;opacity:0.85;"></i>' : ''}${event.title}</div>
                            <div class="event-time">${event.startTime} - ${event.endTime}</div>
                        `;
                        block.onclick = (e) => {
                            e.stopPropagation();
                            editEvent(event.id);
                        };
                        slot.appendChild(block);
                    });
                    
                    grid.appendChild(slot);
                }
            }
        }

        function getEventsForTimeSlot(date, hour) {
            const dateStr = date.getFullYear() + '-' +
                String(date.getMonth() + 1).padStart(2, '0') + '-' +
                String(date.getDate()).padStart(2, '0');
            const viewStart = new Date(date); viewStart.setHours(0,0,0,0);
            const viewEnd = new Date(date); viewEnd.setHours(23,59,59,999);
            return events.filter(event => {
                const instances = getEventInstances(event, viewStart, viewEnd);
                if (!instances.includes(dateStr)) return false;
                const [startHour] = event.startTime.split(':').map(Number);
                return startHour === hour;
            });
        }

        function renderListView() {
            const container = document.getElementById('eventsList');
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar" style="color: #06b6d4;"></i>
                        <p>No study sessions scheduled yet.</p>
                        <p style="font-size: 14px;">Click "New Event" to create your first study session!</p>
                    </div>
                `;
                return;
            }
            
            // Expand recurring events into instances within next 6 months
            const listViewStart = new Date(); listViewStart.setHours(0,0,0,0);
            const listViewEnd = new Date(); listViewEnd.setMonth(listViewEnd.getMonth() + 6);

            const expandedEvents = [];
            events.forEach(event => {
                const instances = getEventInstances(event, listViewStart, listViewEnd);
                instances.forEach(dateStr => {
                    expandedEvents.push({ ...event, displayDate: dateStr });
                });
            });

            expandedEvents.sort((a, b) => {
                const dateA = new Date(a.displayDate + 'T' + (a.startTime || '00:00'));
                const dateB = new Date(b.displayDate + 'T' + (b.startTime || '00:00'));
                return dateA - dateB;
            });

            container.innerHTML = expandedEvents.map(event => {
                const classInfo = classes.find(c => String(c.id) === String(event.classId));
                const date = parseLocalDate(event.displayDate);
                const repeatIcon = (event.recurrence && event.recurrence !== 'none')
                    ? '<i class="fas fa-repeat" style="color:#3b82f6;margin-right:4px;font-size:12px;" title="Recurring"></i>' : '';

                return `
                    <div class="event-item" onclick="editEvent(${event.id})">
                        <div class="event-color" style="background: ${event.color};"></div>
                        <div class="event-details">
                            <div class="event-name">${repeatIcon}${event.title}</div>
                            <div class="event-info">
                                <i class="fas fa-calendar" style="color: #06b6d4;"></i> ${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}
                                <span style="margin: 0 10px;">•</span>
                                <i class="fas fa-clock" style="color: #ef4444;"></i> ${event.startTime} - ${event.endTime}
                                ${classInfo ? `<span style="margin: 0 10px;">•</span><i class="fas ${classInfo.icon || 'fa-graduation-cap'}" style="color: ${classInfo.color};"></i> ${classInfo.name}` : ''}
                            </div>
                        </div>
                        <div class="event-actions">
                            <button class="icon-btn" onclick="event.stopPropagation(); editEvent(${event.id});">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="icon-btn delete" onclick="event.stopPropagation(); deleteEvent(${event.id});">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderMonthView();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderMonthView();
        }

        function previousWeek() {
            currentDate.setDate(currentDate.getDate() - 7);
            renderWeekView();
        }

        function nextWeek() {
            currentDate.setDate(currentDate.getDate() + 7);
            renderWeekView();
        }

        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day;
            return new Date(d.setDate(diff));
        }

        function goToToday() {
            currentDate = new Date();
            if (currentView === 'month') renderMonthView();
            else if (currentView === 'week') renderWeekView();
        }

        function openEventModal(date = null) {
            document.getElementById('eventModal').classList.add('active');
            document.getElementById('eventForm').reset();
            document.getElementById('editingEventId').value = '';
            document.getElementById('modalTitle').textContent = 'New Study Session';
            
            if (date) {
                // Format date as YYYY-MM-DD in local timezone (not UTC)
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                document.getElementById('eventDate').value = dateStr;
                
                if (date.getHours() !== 0) {
                    const timeStr = date.toTimeString().slice(0, 5);
                    document.getElementById('eventStartTime').value = timeStr;
                }
            } else {
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                document.getElementById('eventDate').value = `${year}-${month}-${day}`;
            }
            
            populateColorOptions();
            updateEventTimes();
        }

        function closeEventModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        function saveEvent(e) {
            e.preventDefault();
            
            const id = document.getElementById('editingEventId').value || Date.now();
            const title = document.getElementById('eventTitle').value;
            const classId = document.getElementById('eventClass').value || null;
            const date = document.getElementById('eventDate').value;
            const startTime = document.getElementById('eventStartTime').value;
            const endTime = document.getElementById('eventEndTime').value;
            const description = document.getElementById('eventDescription').value;
            const recurrence = document.getElementById('eventRecurrence').value || 'none';

            // Resolve className from classes list
            const classObj = classes.find(c => String(c.id) === String(classId));
            const className = classObj ? classObj.name : null;

            // Find existing event to preserve taskId/todoId
            const existingEvent = events.find(ev => ev.id === parseInt(id));
            const isNew = !existingEvent;

            const event = {
                id: parseInt(id),
                title,
                classId,
                className,
                date,
                startTime,
                endTime,
                description,
                color: selectedColor,
                recurrence,
                created: new Date().toISOString(),
                // Preserve linked task/todo IDs
                taskId: existingEvent?.taskId,
                todoId: existingEvent?.todoId,
                type: existingEvent?.type
            };
            
            const existingIndex = events.findIndex(e => e.id === event.id);
            if (existingIndex >= 0) {
                events[existingIndex] = event;
            } else {
                events.push(event);
            }
            
            vieraAPI.setEvents(events);
            
            // Log activity for new events
            if (isNew) {
                logActivity('fas fa-calendar-plus', 'orange', `Scheduled: ${title}`);
            }
            
            // Sync date change back to Progress Tracker if this event is linked to a task
            if (event.taskId) {
                syncDateToProgressTracker(event.taskId, date);
            }
            
            // Sync date change back to To-Do List if this event is linked to a todo
            if (event.todoId) {
                syncDateToTodo(event.todoId, date);
            }
            
            closeEventModal();
            
            if (currentView === 'month') renderMonthView();
            else if (currentView === 'week') renderWeekView();
            else renderListView();
        }
        
        function syncDateToProgressTracker(taskId, newDate) {
            let tasks = vieraAPI.getTasks() || [];
            const taskIndex = tasks.findIndex(t => t.id === taskId);
            if (taskIndex >= 0) {
                tasks[taskIndex].due = newDate;
                vieraAPI.setTasks(tasks);
            }
        }
        
        function syncDateToTodo(todoId, newDate) {
            let todos = vieraAPI.getTodos() || [];
            const todoIndex = todos.findIndex(t => t.id === todoId);
            if (todoIndex >= 0) {
                todos[todoIndex].due = newDate;
                vieraAPI.setTodos(todos);
            }
        }

        function editEvent(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;
            
            document.getElementById('eventModal').classList.add('active');
            document.getElementById('modalTitle').textContent = 'Edit Study Session';
            document.getElementById('editingEventId').value = event.id;
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventClass').value = event.classId || '';
            document.getElementById('eventDate').value = event.date;
            document.getElementById('eventStartTime').value = event.startTime;
            document.getElementById('eventEndTime').value = event.endTime;
            document.getElementById('eventDescription').value = event.description || '';
            document.getElementById('eventRecurrence').value = event.recurrence || 'none';

            selectedColor = event.color;
            populateColorOptions();
        }

        async function deleteEvent(id) {
            const confirmed = await showConfirmation(
                'This study session will be permanently deleted. This action cannot be undone.',
                'Delete Study Session?',
                'danger'
            );
            
            if (confirmed) {
                events = events.filter(e => e.id !== id);
                vieraAPI.setEvents(events);
                
                if (currentView === 'month') renderMonthView();
                else if (currentView === 'week') renderWeekView();
                else renderListView();
                
                showNotification('Study session deleted successfully', 'success', 'Event Deleted');
            }
        }

        function showDayEvents(date, dayEvents) {
            // Switch to list view and filter by the selected date
            currentView = 'list';
            switchView('list');
            
            // Optionally, you could add date filtering here
            // For now, just show the list view which will show all events sorted
        }

        // Class select change - auto-set color
        document.getElementById('eventClass').addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            if (selected.dataset.color) {
                selectColor(selected.dataset.color);
            }
        });

        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for API to be ready (data loaded from cloud)
            await vieraAPI.ready;
            
            // Only redirect if there's truly no token
            if (!vieraAPI.isLoggedIn()) {
                window.location.href = '/';
                return;
            }
            
            initializeData();
            init();
        });

        // Escape key closes event modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const eventModal = document.getElementById('eventModal');
                if (eventModal && eventModal.classList.contains('active')) {
                    closeEventModal();
                }
            }
        });
    </script>
    <script src="api.js"></script>
    <script src="shared.js"></script>
</body>
</html>
